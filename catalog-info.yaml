apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ibm-storage-fusion
  title: IBM Storage Fusion
  description: |
    IBM Storage Fusion is a container-native hybrid cloud data platform that offers simplified deployment and data management 
    for Kubernetes applications on Red Hat OpenShift Container Platform.
    
    This repository contains:
    - Backup and Restore Recipes
    - Reference Applications
    - Helpful Utilities and Scripts
    - AI Platform Quickstarts
