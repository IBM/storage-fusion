  links:
    - url: https://github.com/IBM/storage-fusion
      title: GitHub Repository
      icon: github
    - url: https://www.ibm.com/products/storage-fusion
      title: Product Page
      icon: web
    - url: https://www.ibm.com/docs/en/fusion-software
      title: Fusion Software Documentation
      icon: docs
    - url: https://www.ibm.com/docs/en/fusion-hci-systems
      title: Fusion HCI Systems Documentation
      icon: docs
    - url: https://ibm.github.io/storage-fusion/fusion-ai/overview/
      title: Fusion Tech Community
      icon: group
    - url: https://github.com/IBM/storage-fusion/tree/main/AI/quickstarts
      title: AI Quickstarts
      icon: catalog
