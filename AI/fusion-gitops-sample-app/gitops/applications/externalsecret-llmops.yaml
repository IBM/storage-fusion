---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: llmops-secrets
  namespace: llmops-platform
  labels:
    app.kubernetes.io/name: llmops-platform
    app.kubernetes.io/component: externalsecret
    app.kubernetes.io/managed-by: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: llmops-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        # CAS API Key from Vault
        cas_api_key: "{{ .cas_api_key }}"
        # Model Gateway API Key (Bearer token) from Vault
        model_gateway_api_key: "{{ .model_gateway_api_key }}"
  dataFrom:
    - extract:
        key: llmops-platform/secrets

# Vault Secret Path: llmops-platform/secrets
# Expected keys in Vault:
#   - cas_api_key: CAS API key for authentication
#   - model_gateway_api_key: Model Gateway Bearer token
#
# To create secrets in Vault:
#   vault kv put secret/llmops-platform/secrets \
#     cas_api_key="cas_api_key" \
#     model_gateway_api_key="model_gateway_api_key"

# Made with Bob
