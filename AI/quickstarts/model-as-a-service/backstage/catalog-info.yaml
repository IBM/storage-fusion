metadata:
  name: model-as-a-service-quickstart
  title: Quickstart - Model as a Service on IBM Fusion
  description: |
    Deploy a complete Model-as-a-Service (MaaS) platform on IBM Fusion using Red Hat OpenShift AI for secure, scalable, and governed foundation model hosting within your own infrastructure.
    
    This quickstart demonstrates how to deploy model serving, storage, registry, gateway, and observability components into a unified deployment workflow for private AI inference on OpenShift. The platform provides Red Hat OpenShift AI platform services, IBM Fusion object storage integration, Model Registry services, gateway-based API routing and exposure, GPU-backed inference runtimes using LLM-D, and monitoring and observability components. Together, these components provide a baseline environment for running and managing enterprise AI inference services on OpenShift.
