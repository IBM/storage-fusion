apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-platform-config-dev
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "50"
  labels:
    environment: dev
    component: platform
spec:
  project: fusion-maas-platform-dev
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-platform
    helm:
      valueFiles:
        - values.yaml
        - environments/dev/values.yaml
      parameters:
        - name: environment
          value: dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: redhat-ods-operator
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      jsonPointers:
        - /status
    - group: authorino.kuadrant.io
      kind: Authorino
      jsonPointers:
        - /status
    - group: kuadrant.io
      kind: Kuadrant
      jsonPointers:
        - /status
  
  info:
    - name: Description
      value: MaaS Platform Configuration - Development Environment
    - name: Component
      value: DataScienceCluster, Authorino, Kuadrant instances
    - name: Sync Wave
      value: "50"
    - name: Dependencies
      value: Requires fusion-maas-operators-dev to be healthy

