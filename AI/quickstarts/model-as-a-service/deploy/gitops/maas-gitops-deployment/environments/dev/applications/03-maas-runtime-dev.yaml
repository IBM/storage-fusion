apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:  fusion-maas-runtime-dev
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "100"
  labels:
    environment: dev
    component: runtime
spec:
  project: fusion-maas-platform-dev
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-runtime
    helm:
      valueFiles:
        - values.yaml
        - environments/dev/values.yaml
      parameters:
        - name: environment
          value: dev
        - name: namespace
          value: maas-dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: maas-dev
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /status
    - group: modelregistry.opendatahub.io
      kind: ModelRegistry
      jsonPointers:
        - /status
    - group: kuadrant.io
      kind: RateLimitPolicy
      jsonPointers:
        - /status
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /status
    - group: ""
      kind: Secret
      name: model-registry-object-storage
      namespace: rhoai-model-registries
      jsonPointers:
        - /data/AWS_ACCESS_KEY_ID
        - /data/AWS_SECRET_ACCESS_KEY
        - /data/AWS_S3_ENDPOINT
        - /data/AWS_S3_BUCKET
  
  info:
    - name: Description
      value: MaaS Runtime - Development Environment
    - name: Component
      value: Gateway, ModelRegistry, RBAC, Storage
    - name: Sync Wave
      value: "100"
    - name: Dependencies
      value: Requires fusion-maas-platform-dev to be healthy
    - name: Namespace
      value: maas-dev

