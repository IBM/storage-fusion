apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-platform-orchestrator-dev
  namespace: openshift-gitops
  labels:
    environment: dev
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: fusion-maas-platform-dev
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/gitops/maas-gitops-deployment/environments/dev/applications
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: route.openshift.io
      kind: Route
      jsonPointers:
        - /status

