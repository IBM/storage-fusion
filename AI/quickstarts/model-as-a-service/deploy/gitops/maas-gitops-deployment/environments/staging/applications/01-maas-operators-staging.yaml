apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:  fusion-maas-operators-staging
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    environment: staging
    component: operators
spec:
  project: fusion-maas-platform-staging
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-operators
    helm:
      valueFiles:
        - values.yaml
        - environments/staging/values.yaml
      parameters:
        - name: environment
          value: staging
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  
  syncPolicy:
    # Manual sync for staging
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  
  ignoreDifferences:
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /status
    - group: operators.coreos.com
      kind: InstallPlan
      jsonPointers:
        - /status
    - group: operators.coreos.com
      kind: ClusterServiceVersion
      jsonPointers:
        - /status
  
  info:
    - name: Description
      value: MaaS Operators - Staging Environment
    - name: Component
      value: Platform Operators (RHOAI, Authorino, Kuadrant)
    - name: Sync Wave
      value: "0"
    - name: Sync Mode
      value: Manual - Requires approval

