apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-operators-prod
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: maas-prod-alerts
    notifications.argoproj.io/subscribe.on-sync-failed.slack: maas-prod-alerts
  labels:
    environment: prod
    component: operators
    criticality: high
spec:
  project: fusion-maas-platform-prod
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master  # Use tags for production
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-operators
    helm:
      valueFiles:
        - values.yaml
        - environments/prod/values.yaml
      parameters:
        - name: environment
          value: prod
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-operators
  
  syncPolicy:
    # MANUAL sync only - NO automation in production
    automated: null
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 2
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  
  ignoreDifferences:
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /status
    - group: operators.coreos.com
      kind: InstallPlan
      jsonPointers:
        - /status
    - group: operators.coreos.com
      kind: ClusterServiceVersion
      jsonPointers:
        - /status
  
  info:
    - name: Description
      value: MaaS Operators - Production Environment
    - name: Component
      value: Platform Operators (RHOAI, Authorino, Kuadrant)
    - name: Sync Wave
      value: "0"
    - name: Sync Mode
      value: MANUAL ONLY - Requires approval and change window
    - name: Criticality
      value: HIGH - Production operators

