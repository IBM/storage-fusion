apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-platform-orchestrator
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fusion-maas-platform
  
  source:
    # Update this to your Git repository URL
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/gitops/maas-gitops-deployment/applications
    directory:
      recurse: false
      include: '*.yaml'
  
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  info:
    - name: 'Deployment Order'
      value: |
        Wave -1: AppProject and RBAC
        Wave 0: maas-operators (must be Healthy + Synced)
        Wave 50: maas-platform (waits for operators to be Healthy + Synced)
        Wave 100: maas-runtime (waits for platform to be Healthy + Synced)
