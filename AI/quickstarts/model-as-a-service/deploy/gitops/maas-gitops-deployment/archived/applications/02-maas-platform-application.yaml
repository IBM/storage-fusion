apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-platform
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "50"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fusion-maas-platform
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-platform
    helm:
      valueFiles:
        - values.yaml
        - ../../examples/Fusion-Agentic-Assistance-Platform/values.yaml
  
  destination:
    server: https://kubernetes.default.svc
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
    
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  
  ignoreDifferences:
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      jsonPointers:
        - /status
        - /spec/components/*/devFlags
    
    - group: kuadrant.io
      kind: Kuadrant
      jsonPointers:
        - /status
    
    - group: operator.openshift.io
      kind: LeaderWorkerSetOperator
      jsonPointers:
        - /status
  
  revisionHistoryLimit: 10

