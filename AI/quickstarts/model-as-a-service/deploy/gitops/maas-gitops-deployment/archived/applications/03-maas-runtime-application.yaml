apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-runtime
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "100"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fusion-maas-platform
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-runtime
    helm:
      valueFiles:
        - values.yaml
        - ../../examples/Fusion-Agentic-Assistance-Platform/values.yaml
  
  destination:
    server: https://kubernetes.default.svc
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: Gateway
      jsonPointers:
        - /status
    
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
  
  revisionHistoryLimit: 10
