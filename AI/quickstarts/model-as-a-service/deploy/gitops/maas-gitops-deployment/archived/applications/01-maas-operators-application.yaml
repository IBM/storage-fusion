apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fusion-maas-operators
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/compare-options: IgnoreExtraneous
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fusion-maas-platform
  
  source:
    repoURL: https://github.com/IBM/storage-fusion.git
    targetRevision: master
    path: AI/quickstarts/model-as-a-service/deploy/helm/maas-operators
    helm:
      valueFiles:
        - values.yaml
        - ../../examples/Fusion-Agentic-Assistance-Platform/values.yaml
  
  destination:
    server: https://kubernetes.default.svc
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: operators.coreos.com
      kind: Subscription
      jsonPointers:
        - /status
        - /spec/installPlanApproval
    
    - group: operators.coreos.com
      kind: InstallPlan
      jsonPointers:
        - /status
    
    - group: operators.coreos.com
      kind: ClusterServiceVersion
      jsonPointers:
        - /status
        - /metadata/annotations
  
  revisionHistoryLimit: 10

