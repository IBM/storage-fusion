apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fusion-maas-model-deploy-dev
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    environment: dev
    component: model-deploy
spec:
  description: MaaS Model Deploy – Development Environment

  sourceRepos:
    - 'https://github.com/IBM/storage-fusion.git'

  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  roles:
    - name: admin
      description: Admin role for model-deploy dev environment
      policies:
        - p, proj:fusion-maas-model-deploy-dev:admin, applications, *, fusion-maas-model-deploy-dev/*, allow
      groups:
        - maas-admins
        - maas-dev-admins

    - name: developer
      description: Developer role for model-deploy dev environment
      policies:
        - p, proj:fusion-maas-model-deploy-dev:developer, applications, get, fusion-maas-model-deploy-dev/*, allow
        - p, proj:fusion-maas-model-deploy-dev:developer, applications, sync, fusion-maas-model-deploy-dev/*, allow
        - p, proj:fusion-maas-model-deploy-dev:developer, applications, update, fusion-maas-model-deploy-dev/*, allow
      groups:
        - maas-developers

    - name: viewer
      description: Read-only role for model-deploy dev environment
      policies:
        - p, proj:fusion-maas-model-deploy-dev:viewer, applications, get, fusion-maas-model-deploy-dev/*, allow
      groups:
        - maas-viewers

  orphanedResources:
    warn: true
