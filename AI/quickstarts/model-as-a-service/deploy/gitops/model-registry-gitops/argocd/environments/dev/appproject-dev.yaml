apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fusion-model-registry-gitops-dev
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app: fusion-model-registry-gitops
    environment: dev
spec:
  description: Model Registry GitOps - Development Environment
  
  sourceRepos:
    - 'https://github.com/IBM/storage-fusion.git'
    - '*'  # Allow flexibility for development
  
  destinations:
    - namespace: fusion-model-registry-gitops-dev
      server: https://kubernetes.default.svc
    - namespace: maas-dev
      server: https://kubernetes.default.svc
    - namespace: rhoai-model-registries
      server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  
  roles:
    - name: admin
      description: Admin role for model registry dev environment
      policies:
        - p, proj:fusion-model-registry-gitops-dev:admin, applications, *, fusion-model-registry-gitops-dev/*, allow
      groups:
        - model-registry-admins
        - maas-dev-admins
    
    - name: developer
      description: Developer role for model registry dev environment
      policies:
        - p, proj:fusion-model-registry-gitops-dev:developer, applications, get, fusion-model-registry-gitops-dev/*, allow
        - p, proj:fusion-model-registry-gitops-dev:developer, applications, sync, fusion-model-registry-gitops-dev/*, allow
        - p, proj:fusion-model-registry-gitops-dev:developer, applications, update, fusion-model-registry-gitops-dev/*, allow
      groups:
        - model-registry-developers
        - maas-developers
    
    - name: viewer
      description: Read-only role for model registry dev environment
      policies:
        - p, proj:fusion-model-registry-gitops-dev:viewer, applications, get, fusion-model-registry-gitops-dev/*, allow
      groups:
        - model-registry-viewers
        - maas-viewers
  
  orphanedResources:
    warn: true
