apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fusion-model-registry-gitops-prod
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  labels:
    app: fusion-model-registry-gitops
    environment: prod
spec:
  description: Model Registry GitOps - Production Environment
  
  sourceRepos:
    - 'https://github.com/IBM/storage-fusion.git'
  
  destinations:
    - namespace: fusion-model-registry-gitops-prod
      server: https://kubernetes.default.svc
    - namespace: maas-prod
      server: https://kubernetes.default.svc
    - namespace: rhoai-model-registries
      server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  
  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: batch
      kind: Job
    - group: batch
      kind: CronJob
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: build.openshift.io
      kind: BuildConfig
    - group: image.openshift.io
      kind: ImageStream
    - group: networking.k8s.io
      kind: NetworkPolicy
  
  roles:
    - name: admin
      description: Admin role for model registry production environment
      policies:
        - p, proj:fusion-model-registry-gitops-prod:admin, applications, *, fusion-model-registry-gitops-prod/*, allow
      groups:
        - model-registry-prod-admins
        - maas-prod-admins
    
    - name: deployer
      description: Deployer role for model registry production environment (manual sync only)
      policies:
        - p, proj:fusion-model-registry-gitops-prod:deployer, applications, get, fusion-model-registry-gitops-prod/*, allow
        - p, proj:fusion-model-registry-gitops-prod:deployer, applications, sync, fusion-model-registry-gitops-prod/*, allow
      groups:
        - model-registry-prod-deployers
    
    - name: viewer
      description: Read-only role for model registry production environment
      policies:
        - p, proj:fusion-model-registry-gitops-prod:viewer, applications, get, fusion-model-registry-gitops-prod/*, allow
      groups:
        - model-registry-viewers
        - maas-viewers
        - all-users
  
  # Stricter orphaned resources handling for production
  orphanedResources:
    warn: true
    ignore:
      - group: ''
        kind: ConfigMap
        name: kube-root-ca.crt
