{{- if .Values.workbench.enabled }}
{{- if .Values.workbench.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    modelmesh-enabled: "false"
{{- with .Values.commonAnnotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
---
{{- end }}
{{- if .Values.workbench.objectStorage.enabled }}
{{- if .Values.workbench.objectStorage.useODF }}
# ObjectBucketClaim for automatic bucket creation using IBM Fusion / OpenShift Data Foundation
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ .Values.workbench.objectStorage.defaultBucket }}
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    {{- include "maas-runtime.annotations" . | nindent 4 }}
    description: "IBM Fusion Object Storage for Workbenches"
spec:
  generateBucketName: {{ .Values.workbench.objectStorage.defaultBucket }}
  storageClassName: {{ .Values.workbench.objectStorage.odfStorageClass | default "openshift-storage.noobaa.io" }}
  {{- if .Values.workbench.objectStorage.bucketRetentionPolicy }}
  additionalConfig:
    bucketclass: {{ .Values.workbench.objectStorage.bucketClass | default "noobaa-default-bucket-class" }}
    {{- if .Values.workbench.objectStorage.maxObjects }}
    maxObjects: {{ .Values.workbench.objectStorage.maxObjects | quote }}
    {{- end }}
    {{- if .Values.workbench.objectStorage.maxSize }}
    maxSize: {{ .Values.workbench.objectStorage.maxSize | quote }}
    {{- end }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: workbench-fusion-storage
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    description: "IBM Fusion Object Storage credentials for Workbenches"
type: Opaque
stringData:
  {{- if .Values.workbench.objectStorage.useODF }}
  # Credentials will be auto-populated from IBM Fusion ObjectBucketClaim
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_S3_ENDPOINT: ""
  AWS_S3_BUCKET: {{ .Values.workbench.objectStorage.defaultBucket | quote }}
  {{- else }}
  # Manual IBM Fusion credentials
  AWS_ACCESS_KEY_ID: {{ .Values.workbench.objectStorage.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.workbench.objectStorage.secretAccessKey | quote }}
  AWS_S3_ENDPOINT: {{ .Values.workbench.objectStorage.endpoint | quote }}
  AWS_S3_BUCKET: {{ .Values.workbench.objectStorage.defaultBucket | quote }}
  {{- end }}
  AWS_DEFAULT_REGION: {{ .Values.workbench.objectStorage.region | quote }}
---
{{- if .Values.workbench.objectStorage.useODF }}
# Job to populate credentials from IBM Fusion ObjectBucketClaim
apiVersion: batch/v1
kind: Job
metadata:
  name: workbench-fusion-setup
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibm-fusion-setup
  annotations:
    description: "Setup IBM Fusion Object Storage for Workbenches"
spec:
  # Allow the job to run for up to 10 minutes
  activeDeadlineSeconds: 600
  # Keep failed jobs for debugging
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "maas-runtime.labels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      serviceAccountName: workbench-sa
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: {{ .Values.global.toolsImage }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Setting up IBM Fusion Object Storage for Workbenches..."
          echo "Waiting for IBM Fusion ObjectBucketClaim to be bound..."
          
          # Wait for OBC to be bound (max 5 minutes)
          for i in {1..60}; do
            STATUS=$(oc get obc {{ .Values.workbench.objectStorage.defaultBucket }} -n {{ .Values.workbench.namespace }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Bound" ]; then
              echo "IBM Fusion ObjectBucketClaim is bound"
              break
            fi
            echo "Waiting for IBM Fusion OBC to be bound... (attempt $i/60, status: $STATUS)"
            sleep 5
          done
          
          if [ "$STATUS" != "Bound" ]; then
            echo "ERROR: IBM Fusion ObjectBucketClaim did not become bound within timeout"
            exit 1
          fi
          
          # Get the ConfigMap and Secret names from IBM Fusion OBC
          OBC_CM=$(oc get obc {{ .Values.workbench.objectStorage.defaultBucket }} -n {{ .Values.workbench.namespace }} -o jsonpath='{.spec.objectBucketName}')
          OBC_SECRET=$(oc get obc {{ .Values.workbench.objectStorage.defaultBucket }} -n {{ .Values.workbench.namespace }} -o jsonpath='{.spec.objectBucketName}')
          
          echo "IBM Fusion OBC ConfigMap: $OBC_CM"
          echo "IBM Fusion OBC Secret: $OBC_SECRET"
          
          # Extract credentials from IBM Fusion OBC secret
          ACCESS_KEY=$(oc get secret $OBC_SECRET -n {{ .Values.workbench.namespace }} -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
          SECRET_KEY=$(oc get secret $OBC_SECRET -n {{ .Values.workbench.namespace }} -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)
          
          # Extract endpoint and bucket from IBM Fusion OBC configmap
          ENDPOINT=$(oc get cm $OBC_CM -n {{ .Values.workbench.namespace }} -o jsonpath='{.data.BUCKET_HOST}')
          BUCKET_NAME=$(oc get cm $OBC_CM -n {{ .Values.workbench.namespace }} -o jsonpath='{.data.BUCKET_NAME}')
          
          # Construct full endpoint URL
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi
          
          echo "Endpoint: $ENDPOINT"
          echo "Bucket: $BUCKET_NAME"
          
          # Update the workbench-fusion-storage secret with IBM Fusion OBC credentials
          oc patch secret workbench-fusion-storage -n {{ .Values.workbench.namespace }} --type=json -p="[
            {\"op\": \"replace\", \"path\": \"/data/AWS_ACCESS_KEY_ID\", \"value\": \"$(echo -n $ACCESS_KEY | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_SECRET_ACCESS_KEY\", \"value\": \"$(echo -n $SECRET_KEY | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_S3_ENDPOINT\", \"value\": \"$(echo -n $ENDPOINT | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_S3_BUCKET\", \"value\": \"$(echo -n $BUCKET_NAME | base64 -w0)\"}
          ]"
          
          echo "Successfully configured Workbench with IBM Fusion Object Storage"
{{- end }}
---
{{- end }}
{{- if .Values.workbench.dataConnections.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: workbench-storage-config
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    description: "IBM Fusion Object Storage configuration for Workbenches"
data:
  storage-type: "ibm-fusion"
  auto-create-buckets: {{ .Values.workbench.objectStorage.autoCreateBuckets | quote }}
  bucket-prefix: {{ .Values.workbench.objectStorage.bucketPrefix | quote }}
  default-pvc-size: {{ .Values.workbench.storage.defaultPVCSize | quote }}
  fusion-endpoint: {{ .Values.workbench.objectStorage.endpoint | quote }}
  fusion-region: {{ .Values.workbench.objectStorage.region | quote }}
  fusion-bucket: {{ .Values.workbench.objectStorage.defaultBucket | quote }}
---
{{- end }}
{{- if .Values.workbench.dataConnections.createDefault }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.workbench.dataConnections.defaultConnectionName }}
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    opendatahub.io/connection-type: s3
    openshift.io/display-name: "IBM Fusion Object Storage"
    description: "Default IBM Fusion Object Storage connection"
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.workbench.objectStorage.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.workbench.objectStorage.secretAccessKey | quote }}
  AWS_S3_ENDPOINT: {{ .Values.workbench.objectStorage.endpoint | quote }}
  AWS_S3_BUCKET: {{ .Values.workbench.objectStorage.defaultBucket | quote }}
  AWS_DEFAULT_REGION: {{ .Values.workbench.objectStorage.region | quote }}
---
{{- end }}
{{- if .Values.workbench.storage.sharedStorage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: workbench-shared-storage
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.workbench.storage.sharedStorage.storageClassName }}
  storageClassName: {{ .Values.workbench.storage.sharedStorage.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.workbench.storage.sharedStorage.size }}
---
{{- end }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workbench-sa
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workbench-manager
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["kubeflow.org"]
  resources: ["notebooks"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workbench-manager-binding
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workbench-manager
subjects:
- kind: ServiceAccount
  name: workbench-sa
  namespace: {{ .Values.workbench.namespace }}
---
{{- if .Values.workbench.culling.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: workbench-idle-culler
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: idle-culler
spec:
  schedule: "*/{{ .Values.workbench.culling.checkInterval }} * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "maas-runtime.labels" . | nindent 12 }}
            app.kubernetes.io/component: idle-culler
        spec:
          serviceAccountName: workbench-sa
          restartPolicy: OnFailure
          containers:
          - name: culler
            image: {{ .Values.global.toolsImage }}
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Checking for idle workbenches..."
              IDLE_TIMEOUT={{ .Values.workbench.culling.idleTimeout }}
              
              # This is a placeholder for the actual culling logic
              # In production, this would check notebook idle time and stop idle notebooks
              echo "Idle timeout: ${IDLE_TIMEOUT} minutes"
              echo "Culling check completed"
{{- end }}
---
{{- if .Values.workbench.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workbench-network-policy
  namespace: {{ .Values.workbench.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  {{- range .Values.workbench.networkPolicies.allowIngress }}
  - from:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  egress:
  - to:
    {{- range .Values.workbench.networkPolicies.allowEgress }}
    - ipBlock:
        cidr: {{ . }}
    {{- end }}
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
{{- end }}
{{- end }}
