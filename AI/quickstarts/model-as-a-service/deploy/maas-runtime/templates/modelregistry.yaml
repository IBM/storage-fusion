{{- if .Values.modelRegistry.enabled }}
{{- if .Values.modelRegistry.createNamespace }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
{{- with .Values.commonAnnotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
---
{{- end }}
{{- if .Values.modelRegistry.objectStorage.enabled }}
{{- if .Values.modelRegistry.objectStorage.autoCreateBucket }}
# ObjectBucketClaim for automatic bucket creation using IBM Fusion / OpenShift Data Foundation
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ .Values.modelRegistry.objectStorage.bucket }}
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    description: "IBM Fusion Object Storage for Model Registry"
{{- with .Values.commonAnnotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
  generateBucketName: {{ .Values.modelRegistry.objectStorage.bucket }}
  storageClassName: {{ .Values.modelRegistry.objectStorage.odfStorageClass | default "openshift-storage.noobaa.io" }}
  {{- if .Values.modelRegistry.objectStorage.bucketRetentionPolicy }}
  additionalConfig:
    bucketclass: {{ .Values.modelRegistry.objectStorage.bucketClass | default "noobaa-default-bucket-class" }}
    {{- if .Values.modelRegistry.objectStorage.maxObjects }}
    maxObjects: {{ .Values.modelRegistry.objectStorage.maxObjects | quote }}
    {{- end }}
    {{- if .Values.modelRegistry.objectStorage.maxSize }}
    maxSize: {{ .Values.modelRegistry.objectStorage.maxSize | quote }}
    {{- end }}
  {{- end }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: model-registry-object-storage
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibm-fusion-storage
  annotations:
    description: "IBM Fusion Object Storage credentials for Model Registry"
type: Opaque
stringData:
  {{- if .Values.modelRegistry.objectStorage.autoCreateBucket }}
  # Credentials will be auto-populated from IBM Fusion ObjectBucketClaim
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_S3_ENDPOINT: ""
  AWS_S3_BUCKET: {{ .Values.modelRegistry.objectStorage.bucket | quote }}
  {{- else }}
  # Manual IBM Fusion credentials
  AWS_ACCESS_KEY_ID: {{ .Values.modelRegistry.objectStorage.accessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.modelRegistry.objectStorage.secretAccessKey | quote }}
  AWS_S3_ENDPOINT: {{ .Values.modelRegistry.objectStorage.endpoint | quote }}
  AWS_S3_BUCKET: {{ .Values.modelRegistry.objectStorage.bucket | quote }}
  {{- end }}
  AWS_DEFAULT_REGION: {{ .Values.modelRegistry.objectStorage.region | quote }}
  AWS_STORAGE_CLASS: {{ .Values.modelRegistry.objectStorage.storageClass | quote }}
  VERIFY_SSL: {{ .Values.modelRegistry.objectStorage.verifySSL | quote }}
---
{{- if .Values.modelRegistry.objectStorage.autoCreateBucket }}
# Job to populate credentials from IBM Fusion ObjectBucketClaim
apiVersion: batch/v1
kind: Job
metadata:
  name: model-registry-fusion-setup
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: ibm-fusion-setup
  annotations:
    description: "Setup IBM Fusion Object Storage for Model Registry"
spec:
  # Allow the job to run for up to 10 minutes
  activeDeadlineSeconds: 600
  # Keep failed jobs for debugging
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "maas-runtime.labels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      serviceAccountName: model-registry-sa
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: {{ .Values.global.toolsImage }}
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Setting up IBM Fusion Object Storage for Model Registry..."
          echo "Waiting for IBM Fusion ObjectBucketClaim to be bound..."
          
          # Wait for OBC to be bound (max 5 minutes)
          for i in {1..60}; do
            STATUS=$(oc get obc {{ .Values.modelRegistry.objectStorage.bucket }} -n {{ .Values.modelRegistry.namespace }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$STATUS" = "Bound" ]; then
              echo "IBM Fusion ObjectBucketClaim is bound"
              break
            fi
            echo "Waiting for IBM Fusion OBC to be bound... (attempt $i/60, status: $STATUS)"
            sleep 5
          done
          
          if [ "$STATUS" != "Bound" ]; then
            echo "ERROR: IBM Fusion ObjectBucketClaim did not become bound within timeout"
            exit 1
          fi
          
          # Get the ConfigMap and Secret names from IBM Fusion OBC
          # The actual resources use the bucket name, not the full objectBucketName
          OBC_CM="{{ .Values.modelRegistry.objectStorage.bucket }}"
          OBC_SECRET="{{ .Values.modelRegistry.objectStorage.bucket }}"
          
          echo "IBM Fusion OBC ConfigMap: $OBC_CM"
          echo "IBM Fusion OBC Secret: $OBC_SECRET"
          
          # Extract credentials from IBM Fusion OBC secret
          ACCESS_KEY=$(oc get secret $OBC_SECRET -n {{ .Values.modelRegistry.namespace }} -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
          SECRET_KEY=$(oc get secret $OBC_SECRET -n {{ .Values.modelRegistry.namespace }} -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)
          
          # Extract endpoint and bucket from IBM Fusion OBC configmap
          ENDPOINT=$(oc get cm $OBC_CM -n {{ .Values.modelRegistry.namespace }} -o jsonpath='{.data.BUCKET_HOST}')
          BUCKET_NAME=$(oc get cm $OBC_CM -n {{ .Values.modelRegistry.namespace }} -o jsonpath='{.data.BUCKET_NAME}')
          
          # Construct full endpoint URL
          if [[ ! "$ENDPOINT" =~ ^https?:// ]]; then
            ENDPOINT="https://$ENDPOINT"
          fi
          
          echo "Endpoint: $ENDPOINT"
          echo "Bucket: $BUCKET_NAME"
          
          # Update the model-registry-object-storage secret with OBC credentials
          oc patch secret model-registry-object-storage -n {{ .Values.modelRegistry.namespace }} --type=json -p="[
            {\"op\": \"replace\", \"path\": \"/data/AWS_ACCESS_KEY_ID\", \"value\": \"$(echo -n $ACCESS_KEY | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_SECRET_ACCESS_KEY\", \"value\": \"$(echo -n $SECRET_KEY | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_S3_ENDPOINT\", \"value\": \"$(echo -n $ENDPOINT | base64 -w0)\"},
            {\"op\": \"replace\", \"path\": \"/data/AWS_S3_BUCKET\", \"value\": \"$(echo -n $BUCKET_NAME | base64 -w0)\"}
          ]"
          
          echo "Successfully configured Model Registry with IBM Fusion Object Storage"
{{- end }}
{{- end }}
---
{{- if not .Values.modelRegistry.database.external }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-registry-db
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.modelRegistry.database.internalDatabase.storageClassName }}
  storageClassName: {{ .Values.modelRegistry.database.internalDatabase.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.modelRegistry.database.internalDatabase.storageSize }}
---
apiVersion: v1
kind: Secret
metadata:
  name: model-registry-db-credentials
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: modelregistry
  {{- $existingSecret := lookup "v1" "Secret" .Values.modelRegistry.namespace "model-registry-db-credentials" }}
  {{- if $existingSecret }}
  POSTGRES_PASSWORD: {{ index $existingSecret.data "POSTGRES_PASSWORD" | b64dec | quote }}
  {{- else }}
  POSTGRES_PASSWORD: {{ randAlphaNum 32 | quote }}
  {{- end }}
  POSTGRES_DB: modelregistry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-db
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "maas-runtime.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      containers:
      - name: postgres
        image: registry.redhat.io/rhel9/postgresql-16:latest
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              name: model-registry-db-credentials
              key: POSTGRES_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: model-registry-db-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: model-registry-db-credentials
              key: POSTGRES_DB
        volumeMounts:
        - name: data
          mountPath: /var/lib/pgsql/data
        resources:
          {{- toYaml .Values.modelRegistry.database.internalDatabase.resources | nindent 10 }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: model-registry-db
---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-db
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  selector:
    app.kubernetes.io/component: database
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: model-registry-db-credentials
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_HOST: {{ .Values.modelRegistry.database.externalDatabase.host | quote }}
  DB_PORT: {{ .Values.modelRegistry.database.externalDatabase.port | quote }}
  DB_NAME: {{ .Values.modelRegistry.database.externalDatabase.database | quote }}
  DB_USER: {{ .Values.modelRegistry.database.externalDatabase.username | quote }}
  DB_PASSWORD: {{ .Values.modelRegistry.database.externalDatabase.password | quote }}
  DB_SSLMODE: {{ .Values.modelRegistry.database.externalDatabase.sslMode | quote }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-registry-config
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
data:
  versioning-enabled: {{ .Values.modelRegistry.versioning.enabled | quote }}
  versioning-format: {{ .Values.modelRegistry.versioning.format | quote }}
  versioning-auto-increment: {{ .Values.modelRegistry.versioning.autoIncrement | quote }}
  required-metadata-fields: {{ .Values.modelRegistry.metadata.requiredFields | join "," | quote }}
  catalog-integration-enabled: {{ .Values.modelRegistry.catalogIntegration.enabled | quote }}
  catalog-auto-register: {{ .Values.modelRegistry.catalogIntegration.autoRegister | quote }}
---
apiVersion: modelregistry.opendatahub.io/v1beta1
kind: ModelRegistry
metadata:
  name: {{ .Values.modelRegistry.name }}
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
spec:
  grpc:
    port: {{ .Values.modelRegistry.service.grpcPort }}
  rest:
    port: {{ .Values.modelRegistry.service.restPort }}
    serviceRoute: disabled
  kubeRBACProxy:
    port: 8443
    routePort: 443
    serviceRoute: enabled
  {{- if .Values.modelRegistry.ingress.enabled }}
  istio:
    audiences:
      - https://kubernetes.default.svc
    authProvider: opendatahub-auth-provider
  {{- end }}
  {{- if not .Values.modelRegistry.database.external }}
  postgres:
    host: model-registry-db.{{ .Values.modelRegistry.namespace }}.svc.cluster.local
    port: 5432
    database: modelregistry
    passwordSecret:
      name: model-registry-db-credentials
      key: POSTGRES_PASSWORD
    username: modelregistry
    skipDBCreation: false
  {{- else }}
  postgres:
    host: {{ .Values.modelRegistry.database.externalDatabase.host }}
    port: {{ .Values.modelRegistry.database.externalDatabase.port }}
    database: {{ .Values.modelRegistry.database.externalDatabase.database }}
    passwordSecret:
      name: model-registry-db-credentials
      key: DB_PASSWORD
    username: {{ .Values.modelRegistry.database.externalDatabase.username }}
    sslMode: {{ .Values.modelRegistry.database.externalDatabase.sslMode }}
    skipDBCreation: true
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-registry-sa
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: model-registry-manager
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "services"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["modelregistry.opendatahub.io"]
  resources: ["modelregistries"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["objectbucket.io"]
  resources: ["objectbucketclaims"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: model-registry-manager-binding
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: model-registry-manager
subjects:
- kind: ServiceAccount
  name: model-registry-sa
  namespace: {{ .Values.modelRegistry.namespace }}
---
{{- if .Values.modelRegistry.catalogIntegration.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: model-registry-catalog-sync
  namespace: {{ .Values.modelRegistry.namespace }}
  labels:
    {{- include "maas-runtime.labels" . | nindent 4 }}
    app.kubernetes.io/component: catalog-sync
spec:
  schedule: {{ .Values.modelRegistry.catalogIntegration.syncSchedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "maas-runtime.labels" . | nindent 12 }}
            app.kubernetes.io/component: catalog-sync
        spec:
          serviceAccountName: model-registry-sa
          restartPolicy: OnFailure
          containers:
          - name: sync
            image: {{ .Values.global.toolsImage }}
            command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Starting Model Registry sync with Model Catalog..."
              echo "Auto-register: $(cat /config/catalog-auto-register)"
              
              # This is a placeholder for the actual sync logic
              # In production, this would call the Model Registry API to register models from the catalog
              echo "Sync completed successfully"
            volumeMounts:
            - name: config
              mountPath: /config
            - name: object-storage
              mountPath: /secrets/object-storage
            - name: db-credentials
              mountPath: /secrets/db
          volumes:
          - name: config
            configMap:
              name: model-registry-config
          - name: object-storage
            secret:
              secretName: model-registry-object-storage
          - name: db-credentials
            secret:
              secretName: model-registry-db-credentials
{{- end }}
{{- end }}