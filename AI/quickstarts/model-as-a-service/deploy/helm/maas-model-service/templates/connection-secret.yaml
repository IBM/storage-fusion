{{- if and .Values.modelRegistry.enabled .Values.modelRegistry.connectionSecret }}
{{- if .Values.modelRegistry.createConnectionSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.modelRegistry.connectionSecret }}
  namespace: {{ include "maas-model-service.namespace" . }}
  labels:
    {{- include "maas-model-service.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
  annotations:
    {{- include "maas-model-service.annotations" . | nindent 4 }}
    opendatahub.io/connection-type-protocol: oci
    opendatahub.io/connection-type-ref: oci-v1
    openshift.io/display-name: {{ .Values.modelRegistry.connectionSecret }}
type: Opaque
data:
  # ACCESS_TYPE: ["Pull"] base64 encoded
  ACCESS_TYPE: {{ .Values.modelRegistry.connectionSecretData.accessType | default "WyJQdWxsIl0=" }}
  # OCI_HOST: registry host base64 encoded (e.g., registry.redhat.io)
  OCI_HOST: {{ .Values.modelRegistry.connectionSecretData.ociHost | required "modelRegistry.connectionSecretData.ociHost is required when createConnectionSecret is true" }}
{{- end }}
{{- end }}