apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    {{- include "model-registry-gitops.labels" . | nindent 4 }}
    component: gitops
  annotations:
    description: "GitOps automation for OpenShift AI Model Registry"
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

