apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "model-registry-gitops.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "model-registry-gitops.labels" . | nindent 4 }}
    component: reconciler
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

