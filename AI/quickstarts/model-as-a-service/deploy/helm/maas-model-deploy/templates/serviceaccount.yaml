---
# ServiceAccount
# -----------------------------------------------------------------------
# The LLMInferenceService references this ServiceAccount so that the
# KServe storage-initializer can read the S3 connection secret and pull
# the model artefacts at pod start-up time.
# -----------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "maas-model-deploy.serviceAccountName" . }}
  namespace: {{ include "maas-model-deploy.namespace" . }}
  labels:
    {{- include "maas-model-deploy.labels" . | nindent 4 }}
  annotations:
    # Shared resource – keep after first creation so a second model application
    # targeting the same namespace does not attempt to recreate or delete it.
    helm.sh/resource-policy: keep
    {{- include "maas-model-deploy.annotations" . | nindent 4 }}
secrets:
  - name: {{ include "maas-model-deploy.connectionSecretName" . }}
