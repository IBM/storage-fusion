---
# S3 Connection Secret
# -----------------------------------------------------------------------
# Provides S3 credentials and endpoint information so that the
# LLMInferenceService can pull model artefacts from object storage.
#
# The secret is annotated with OpenShift AI / KServe serving annotations
# so that it is recognised as an S3 data connection in the RHOAI dashboard.
#
# !!! IMPORTANT !!!
# Never commit real accessKeyId / secretAccessKey values in this file.
# Pass them at deploy time:
#   helm install ... --set s3.accessKeyId=<key> --set s3.secretAccessKey=<secret>
# -----------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "maas-model-deploy.connectionSecretName" . }}
  namespace: {{ include "maas-model-deploy.namespace" . }}
  labels:
    {{- include "maas-model-deploy.labels" . | nindent 4 }}
    opendatahub.io/dashboard: "true"
    opendatahub.io/managed: "true"
  annotations:
    # Shared resource – keep after first creation so a second model application
    # targeting the same namespace does not attempt to recreate or delete it.
    helm.sh/resource-policy: keep
    {{- include "maas-model-deploy.annotations" . | nindent 4 }}
    opendatahub.io/connection-type: s3
    opendatahub.io/connection-type-protocol: s3
    opendatahub.io/connection-type-ref: s3
    openshift.io/display-name: {{ include "maas-model-deploy.connectionSecretName" . }}
    serving.kserve.io/s3-endpoint: {{ .Values.s3.endpoint | quote }}
    serving.kserve.io/s3-region: {{ .Values.s3.region | quote }}
    serving.kserve.io/s3-usehttps: "1"
    serving.kserve.io/s3-verifyssl: {{ .Values.s3.verifySSL | default "0" | quote }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ .Values.s3.accessKeyId | required "s3.accessKeyId is required" | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.s3.secretAccessKey | required "s3.secretAccessKey is required" | quote }}
  AWS_S3_ENDPOINT: {{ .Values.s3.endpoint | quote }}
  AWS_S3_BUCKET: {{ .Values.s3.bucket | quote }}
  AWS_DEFAULT_REGION: {{ .Values.s3.region | quote }}
