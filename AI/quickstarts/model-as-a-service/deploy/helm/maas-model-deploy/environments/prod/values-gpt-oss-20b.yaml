# =============================================================================
# Environment override – Production  |  Model: gpt-oss-20b
# =============================================================================
# Overrides for the gpt-oss-20b model in the production environment.
# Supply s3.accessKeyId and s3.secretAccessKey via sealed-secrets or
# --set flags at deploy time. Never commit real credentials.
# =============================================================================

# -----------------------------------------------------------------------------
# Model Identification
# -----------------------------------------------------------------------------
model:
  name: gpt-oss-20b
  displayName: "GPT-OSS-20b"
  namespace: deploy-models

# -----------------------------------------------------------------------------
# Project / Namespace Configuration
# -----------------------------------------------------------------------------
project:
  # create: true
  labels:
    environment: prod
  # annotations: {}

# -----------------------------------------------------------------------------
# S3 Object Storage Configuration
# -----------------------------------------------------------------------------
s3:
  # endpoint: "https://s3.openshift-storage.svc:443"
  # region: "us-south"
  # bucket: "model-registry-artifacts-p-ccc9b6a9-897a-4971-9161-9c0d25448836"
  modelPath: "gpt-oss-20b-hf/1.0.0"
  accessKeyId: ""        # supply via --set or sealed-secret
  secretAccessKey: ""    # supply via --set or sealed-secret
  # verifySSL: "0"
  connectionSecretName: ""
  serviceAccountName: ""

# -----------------------------------------------------------------------------
# Inference Configuration
# -----------------------------------------------------------------------------
inference:
  replicas: 1

# -----------------------------------------------------------------------------
# Resource Allocation
# -----------------------------------------------------------------------------
resources:
  limits:
    cpu: "2"
    memory: 4Gi
    nvidia.com/gpu: "1"
  requests:
    cpu: "2"
    memory: 4Gi
    nvidia.com/gpu: "1"

# -----------------------------------------------------------------------------
# Pod Scheduling
# -----------------------------------------------------------------------------
scheduling:
  nodeSelector: {}
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  affinity: {}

# -----------------------------------------------------------------------------
# Gateway Configuration
# -----------------------------------------------------------------------------
# gpt-oss-20b is the first model deployed — it owns the shared OpenShift Route
# that exposes the openshift-ai-inference Gateway to external traffic.
# All other models set exposeGateway: false and rely on this Route.
#
# External URL for this model:
#   https://openshift-ai-inference-openshift-ingress.apps.f55l020.fusion.tadn.ibm.com/deploy-models/gpt-oss-20b/v1/
gateway:
  name: openshift-ai-inference
  namespace: openshift-ingress
  wildcardDomain: "apps.f55l020.fusion.tadn.ibm.com"
  exposeGateway: true   # owns the shared Route — only set on ONE model per cluster

# -----------------------------------------------------------------------------
# Additional Labels / Annotations
# -----------------------------------------------------------------------------
labels:
  environment: prod

annotations: {}
