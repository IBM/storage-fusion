# Helm values for deploying qwen3-8b-fp8-dynamic from model registry
# This model is registered in the model-registry

model:
  name: qwen3-8b-fp8-dynamic-version-1
  displayName: "Qwen3 8B FP8 Dynamic - Version 1"
  namespace: deploy-models-rhoai

project:
  create: true  # Create namespace if it doesn't exist

# Model Registry Configuration
modelRegistry:
  enabled: true
  name: model-registry
  namespace: rhoai-model-registries
  # This is the registered model name from the model registry
  registeredModelName: "qwen3-8b-fp8-dynamic"
  # Registered model IDs and latest version are resolved automatically at deploy time
  # Shared namespace-level connection secret used by all models in this namespace
  connectionSecret: "model-registry-connection"
  
  # Do not create a per-model secret. Reuse the existing namespace secret instead.
  createConnectionSecret: false

# Model source URI is resolved automatically from the model registry at deploy time
source:
  uri: ""

# Inference engine configuration
inference:
  engine: vllm
  image: ""  # Will use default from OpenShift AI
  imagePullPolicy: IfNotPresent
  replicas: 1
  
  # vLLM specific arguments for Qwen3 with FP8 dynamic quantization
  extraArgs:
    - --enable-force-include-usage
    - --enable-auto-tool-choice
    - --tool-call-parser=qwen3_coder
    - --trust-remote-code
  
  env:
    - name: VLLM_ADDITIONAL_ARGS
      value: "--max-model-len=32768 --gpu-memory-utilization=0.9 --quantization=fp8"

# Resource allocation (based on model requirements)
resources:
  limits:
    cpu: "16"
    memory: 64Gi
    nvidia.com/gpu: "1"
  requests:
    cpu: "8"
    memory: 32Gi
    nvidia.com/gpu: "1"

# Pod scheduling configuration
scheduling:
  nodeSelector: {}
  
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  
  affinity: {}

# Tier-based access control
tiers:
  - free
  - premium
  - enterprise

# Rate limiting configuration
rateLimiting:
  enabled: true
  # Custom rate limits per tier (optional - leave empty to use tier defaults from maas-runtime)
  customLimits:
    free:
      requestRates:
        - limit: 5
          window: 1m
    premium:
      requestRates:
        - limit: 50
          window: 1m
    enterprise:
      requestRates:
        - limit: 500
          window: 1m

# Token-based rate limiting
tokenRateLimiting:
  enabled: true
  customLimits:
    free:
      tokenRates:
        - limit: 10000
          window: 1m
    premium:
      tokenRates:
        - limit: 100000
          window: 1m
    enterprise:
      tokenRates:
        - limit: 1000000
          window: 1m

# Gateway configuration
gateway:
  # Set to true to automatically expose the gateway for external access
  exposeExternally: false

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Labels
labels:
  use-case: conversational-ai
  model-type: qwen
  model-family: qwen3
  environment: production
  quantization: fp8-dynamic
  vendor: alibaba

# Annotations
annotations:
  description: "Qwen3 8B FP8 Dynamic model with tool-calling capabilities"
  model-card-url: "https://huggingface.co/Qwen/Qwen3-8B"
  validation-status: "validated"
  validation-platform: "RHOAI 2.24, RHAIIS 3.2.1"

