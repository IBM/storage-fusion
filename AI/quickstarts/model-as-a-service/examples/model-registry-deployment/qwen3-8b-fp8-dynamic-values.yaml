# Helm values for deploying Qwen3-8B-FP8-dynamic from model registry
# This model is registered in the model-registry

model:
  name: qwen3-8b-fp8-dynamic-version-1
  displayName: "Qwen3-8B-FP8-dynamic - Version 1"
  namespace: deploy-models-rhoai

project:
  create: false  # Namespace should already exist

# Model Registry Configuration
modelRegistry:
  enabled: true
  name: model-registry
  namespace: rhoai-model-registries
  # This is the registered model name from the model registry
  registeredModelName: "Qwen3-8B-FP8-dynamic"
  # Optional: specify IDs if known
  registeredModelId: "3"
  modelVersionId: "4"
  # Connection secret for pulling model images (if required)
  connectionSecret: "granite-3-1-8b-lab-v1-model"

# Model source - will be validated against registry
source:
  uri: oci://registry.redhat.io/rhelai1/modelcar-qwen3-8b-fp8-dynamic:1.5

# Inference engine configuration
inference:
  engine: vllm
  image: ""  # Will use default from OpenShift AI
  imagePullPolicy: IfNotPresent
  replicas: 1
  
  # vLLM specific arguments
  extraArgs: []
  
  env: []

# Resource allocation
resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "2"
    memory: 4Gi

# Pod scheduling configuration
scheduling:
  nodeSelector: {}
  
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  
  affinity: {}

# Tier-based access control
tiers:
  - free
  - premium
  - enterprise

# Rate limiting configuration
rateLimiting:
  enabled: true
  customLimits: {}

# Token-based rate limiting
tokenRateLimiting:
  enabled: true
  customLimits: {}

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Gateway configuration
gateway:
  name: maas-gateway
  namespace: openshift-ingress
