# Helm values for deploying granite-3.1-8b-instruct from model registry
# This model is registered in the model-registry

model:
  name: granite-31-8b-instruct-version-1
  displayName: "Granite 3.1 8B Instruct - Version 1"
  namespace: deploy-models-rhoai

project:
  create: true  # Create namespace if it doesn't exist

# Model Registry Configuration
modelRegistry:
  enabled: true
  name: model-registry
  namespace: rhoai-model-registries
  # This is the registered model name from the model registry
  registeredModelName: "granite-3.1-8b-instruct"
  # Registered model IDs and latest version are resolved automatically at deploy time
  # Shared namespace-level connection secret used by all models in this namespace
  connectionSecret: "model-registry-connection"
  
  # Do not create a per-model secret. Reuse the existing namespace secret instead.
  createConnectionSecret: false

# Model source URI is resolved automatically from the model registry at deploy time
source:
  uri: ""

# Inference engine configuration
inference:
  engine: vllm
  image: ""  # Will use default from OpenShift AI
  imagePullPolicy: IfNotPresent
  replicas: 1
  
  # vLLM specific arguments
  extraArgs: []
  
  env:
    - name: VLLM_ADDITIONAL_ARGS
      value: "--max-model-len=32768 --gpu-memory-utilization=0.95"

# Resource allocation
resources:
  limits:
    cpu: "2"
    memory: 4Gi
  requests:
    cpu: "2"
    memory: 4Gi

# Pod scheduling configuration
scheduling:
  nodeSelector: {}
  
  tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
  
  affinity: {}

# Tier-based access control
tiers:
  - free
  - premium
  - enterprise

# Rate limiting configuration
rateLimiting:
  enabled: true
  # Custom rate limits per tier (optional - leave empty to use tier defaults from maas-runtime)
  customLimits:
    free:
      requestRates:
        - limit: 10
          window: 1m
    premium:
      requestRates:
        - limit: 100
          window: 1m
    enterprise:
      requestRates:
        - limit: 1000
          window: 1m

# Token-based rate limiting
tokenRateLimiting:
  enabled: false
  customLimits: {}

# Gateway configuration
gateway:
  # Set to true to automatically expose the gateway for external access
  exposeExternally: true

# Monitoring configuration
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

# Labels
labels:
  use-case: general-purpose
  model-type: granite
  environment: production

# Annotations
annotations:
  # description: "Granite 3.1 8B Instruct model deployed from model registry"
  # model-card-url: "https://huggingface.co/ibm-granite/granite-3.1-8b-instruct"
