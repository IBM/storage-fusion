{{- if and .Values.operator.enabled .Values.secretStores.aws.enabled .Values.secretStores.aws.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-aws-secrets-egress
  namespace: external-secrets
  labels:
    {{- include "external-secrets-operator.labels" . | nindent 4 }}
    app: external-secrets
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: external-secrets-operator
  annotations:
    "argocd.argoproj.io/sync-wave": "2"
    "helm.sh/resource-policy": keep
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  policyTypes:
    - Egress
  egress:
    # Allow outbound HTTPS traffic to AWS endpoints
    # - AWS Secrets Manager API endpoints (port 443)
    # - AWS STS for authentication (port 443)
    - to: []
      ports:
        - protocol: TCP
          port: 443

    # Allow DNS resolution via kube-system (CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53

    # Allow DNS resolution via openshift-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: UDP
          port: 5353
{{- end }}

