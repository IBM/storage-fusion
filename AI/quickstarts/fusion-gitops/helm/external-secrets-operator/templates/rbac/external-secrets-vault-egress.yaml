{{- if and .Values.operator.enabled .Values.secretStores.vault.enabled .Values.secretStores.vault.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: {{ .Values.operator.namespace }}
  labels:
    {{- include "external-secrets-operator.labels" . | nindent 4 }}
    app: external-secrets
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: external-secrets-operator
  annotations:
    "argocd.argoproj.io/sync-wave": "2"
    "helm.sh/resource-policy": keep
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  policyTypes:
    - Egress
  egress:
    # Allow access to Vault
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.secretStores.vault.rbac.vaultNamespace }}
      ports:
        - protocol: TCP
          port: 8200
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - protocol: UDP
          port: 5353
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
{{- end }}

