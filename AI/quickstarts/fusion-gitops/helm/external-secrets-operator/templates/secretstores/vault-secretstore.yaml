{{- if and .Values.operator.enabled .Values.secretStores.vault.enabled }}
{{- /* Determine tokenSecret based on sealType if not explicitly set */ -}}
{{- $tokenSecret := .Values.secretStores.vault.tokenSecret -}}
{{- if not $tokenSecret -}}
  {{- if eq .Values.secretStores.vault.sealType "awskms" -}}
    {{- $tokenSecret = "vault-recovery-keys" -}}
  {{- else -}}
    {{- $tokenSecret = "vault-unseal-keys" -}}
  {{- end -}}
{{- end -}}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.secretStores.vault.name }}
  labels:
    {{- include "external-secrets-operator.labels" . | nindent 4 }}
  annotations:
    "argocd.argoproj.io/sync-wave": "2"
    "helm.sh/resource-policy": keep
    {{- if not .Values.secretStores.vault.tokenSecret }}
    "vault.seal-type": {{ .Values.secretStores.vault.sealType | quote }}
    "vault.token-secret": {{ $tokenSecret | quote }}
    {{- end }}
spec:
  provider:
    vault:
      server: {{ .Values.secretStores.vault.server | quote }}
      path: {{ .Values.secretStores.vault.path | quote }}
      version: {{ .Values.secretStores.vault.version | quote }}
      {{- if .Values.secretStores.vault.namespace }}
      namespace: {{ .Values.secretStores.vault.namespace | quote }}
      {{- end }}
      
      {{- if eq .Values.secretStores.vault.auth.method "kubernetes" }}
      auth:
        kubernetes:
          mountPath: {{ .Values.secretStores.vault.auth.kubernetes.mountPath | quote }}
          role: {{ .Values.secretStores.vault.auth.kubernetes.role | quote }}
          serviceAccountRef:
            name: {{ .Values.secretStores.vault.auth.kubernetes.serviceAccountRef.name }}
            namespace: {{ .Values.secretStores.vault.auth.kubernetes.serviceAccountRef.namespace }}
      {{- else if eq .Values.secretStores.vault.auth.method "token" }}
      auth:
        tokenSecretRef:
          name: {{ .Values.secretStores.vault.auth.token.secretRef.name }}
          key: {{ .Values.secretStores.vault.auth.token.secretRef.key }}
          namespace: {{ .Values.secretStores.vault.auth.token.secretRef.namespace }}
      {{- else if eq .Values.secretStores.vault.auth.method "appRole" }}
      auth:
        appRole:
          path: {{ .Values.secretStores.vault.auth.appRole.path | quote }}
          roleId: {{ .Values.secretStores.vault.auth.appRole.roleId | quote }}
          secretRef:
            name: {{ .Values.secretStores.vault.auth.appRole.secretRef.name }}
            key: {{ .Values.secretStores.vault.auth.appRole.secretRef.key }}
            namespace: {{ .Values.secretStores.vault.auth.appRole.secretRef.namespace }}
      {{- end }}
      
      {{- if .Values.secretStores.vault.tls.enabled }}
      caBundle: {{ .Values.secretStores.vault.tls.caBundle | quote }}
      {{- if .Values.secretStores.vault.tls.certSecretRef }}
      clientCert:
        clientCert:
          name: {{ .Values.secretStores.vault.tls.certSecretRef.name }}
          key: {{ .Values.secretStores.vault.tls.certSecretRef.key }}
          namespace: {{ .Values.secretStores.vault.tls.certSecretRef.namespace }}
        clientKey:
          name: {{ .Values.secretStores.vault.tls.keySecretRef.name }}
          key: {{ .Values.secretStores.vault.tls.keySecretRef.key }}
          namespace: {{ .Values.secretStores.vault.tls.keySecretRef.namespace }}
      {{- end }}
      {{- end }}
{{- end }}

