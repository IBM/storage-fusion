# Default values for external-secrets-operator
# This chart deploys External Secrets Operator on IBM Fusion HCI / OpenShift
#
# Configured for OpenShift Data Foundation (ODF) storage

# Global settings
global:
  # OpenShift specific settings
  openshift: true
  # Namespace where External Secrets Operator will be deployed
  namespace: external-secrets-operator

# Operator configuration
operator:
  # Enable/disable operator deployment
  enabled: true
  # Operator namespace
  namespace: external-secrets-operator
  
  # Operator subscription settings
  subscription:
    # Channel for operator updates
    channel: stable-v1
    # Catalog source - Use Red Hat certified operator for OpenShift
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    # Package name for Red Hat OpenShift operator
    name: openshift-external-secrets-operator
    # Install plan approval (Automatic or Manual)
    installPlanApproval: Automatic
    # Starting CSV (leave empty for latest)
    startingCSV: ""
  
  # Operator replicas
  replicas: 2
  
  # Resource limits and requests
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# SecretStore configurations
# These create ClusterSecretStore resources for different backends
secretStores:
  # HashiCorp Vault backend
  vault:
    enabled: false
    name: vault-backend
    # Vault server configuration
    server: "http://vault.vault.svc.cluster.local:8200"
    # Path to secrets (for KV v2)
    path: "secret"
    # KV version (v1 or v2)
    version: "v2"
    # Namespace (Vault Enterprise)
    namespace: ""
    
    # Authentication method
    auth:
      # Method: kubernetes, token, appRole, jwt, cert, ldap, userPass, aws, gcp, azure
      method: kubernetes
      
      # Kubernetes auth configuration
      kubernetes:
        # Mount path for Kubernetes auth
        mountPath: "kubernetes"
        # Kubernetes role
        role: "external-secrets"
        # Service account to use
        serviceAccountRef:
          name: external-secrets-operator
          namespace: external-secrets-operator
      
      # Token auth configuration (alternative)
      token:
        # Secret containing the token
        secretRef:
          name: vault-token
          key: token
          namespace: external-secrets-operator
      
      # AppRole auth configuration (alternative)
      appRole:
        path: "approle"
        roleId: ""
        secretRef:
          name: vault-approle
          key: secret-id
          namespace: external-secrets-operator
    
    # TLS configuration
    tls:
      enabled: false
      # CA certificate
      caBundle: ""
      # Client certificate
      certSecretRef:
        name: vault-client-cert
        key: tls.crt
        namespace: external-secrets-operator
      # Client key
      keySecretRef:
        name: vault-client-cert
        key: tls.key
        namespace: external-secrets-operator
  
  # AWS Secrets Manager backend
  aws:
    enabled: false
    name: aws-secrets-manager
    # AWS region
    region: "us-east-1"
    # Service (SecretsManager or ParameterStore)
    service: SecretsManager
    
    # Authentication method
    auth:
      # Method: credentials, irsa (IAM Roles for Service Accounts)
      method: credentials
      
      # Credentials auth (access key/secret)
      credentials:
        accessKeyIDSecretRef:
          name: aws-credentials
          key: access-key-id
          namespace: external-secrets-operator
        secretAccessKeySecretRef:
          name: aws-credentials
          key: secret-access-key
          namespace: external-secrets-operator
      
      # IRSA auth (for EKS)
      irsa:
        serviceAccountRef:
          name: external-secrets-operator
          namespace: external-secrets-operator
  
  # IBM Cloud Secrets Manager backend
  ibmCloud:
    enabled: false
    name: ibm-secrets-manager
    # IBM Cloud Secrets Manager instance URL
    serviceUrl: "https://your-instance.secrets-manager.cloud.ibm.com"
    # IBM Cloud region
    region: "us-south"
    
    # Authentication method
    auth:
      # Method: apiKey, containerAuth
      method: apiKey
      
      # API Key auth
      apiKey:
        secretRef:
          name: ibm-cloud-credentials
          key: api-key
          namespace: external-secrets-operator
      
      # Container auth (for IBM Cloud Kubernetes Service)
      containerAuth:
        profile: "default"
        tokenLocation: "/var/run/secrets/tokens/vault-token"
  
  # Azure Key Vault backend
  azure:
    enabled: false
    name: azure-keyvault
    # Azure Key Vault URL
    vaultUrl: "https://your-vault.vault.azure.net"
    # Tenant ID
    tenantId: ""
    
    # Authentication method
    auth:
      # Method: clientSecret, managedIdentity, workloadIdentity
      method: clientSecret
      
      # Client Secret auth
      clientSecret:
        clientId: ""
        secretRef:
          name: azure-credentials
          key: client-secret
          namespace: external-secrets-operator
      
      # Managed Identity auth
      managedIdentity:
        identityId: ""
  
  # Google Cloud Secret Manager backend
  gcp:
    enabled: false
    name: gcp-secret-manager
    # GCP project ID
    projectID: ""
    
    # Authentication method
    auth:
      # Method: serviceAccount, workloadIdentity
      method: serviceAccount
      
      # Service Account auth
      serviceAccount:
        secretRef:
          name: gcp-credentials
          key: service-account-key
          namespace: external-secrets-operator
      
      # Workload Identity auth (for GKE)
      workloadIdentity:
        clusterLocation: "us-central1"
        clusterName: "my-cluster"
        serviceAccountRef:
          name: external-secrets-operator
          namespace: external-secrets-operator

# Example ExternalSecret configurations
examples:
  # Enable example resources
  enabled: false
  
  # Example for Vault
  vault:
    enabled: false
    name: example-vault-secret
    namespace: default
    # Refresh interval
    refreshInterval: 1h
    # Target secret name
    targetSecretName: vault-secret
    # Secret store reference
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    # Data to sync
    data:
      - secretKey: username
        remoteRef:
          key: myapp/database
          property: username
      - secretKey: password
        remoteRef:
          key: myapp/database
          property: password
  
  # Example for AWS
  aws:
    enabled: false
    name: example-aws-secret
    namespace: default
    refreshInterval: 1h
    targetSecretName: aws-secret
    secretStoreRef:
      name: aws-secrets-manager
      kind: ClusterSecretStore
    data:
      - secretKey: api-key
        remoteRef:
          key: myapp/api-credentials
          property: api-key
  
  # Example for IBM Cloud
  ibmCloud:
    enabled: false
    name: example-ibm-secret
    namespace: default
    refreshInterval: 1h
    targetSecretName: ibm-secret
    secretStoreRef:
      name: ibm-secrets-manager
      kind: ClusterSecretStore
    data:
      - secretKey: database-password
        remoteRef:
          key: myapp/database
          property: password

# Webhook configuration
webhook:
  enabled: true
  replicas: 2
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Cert Controller configuration
certController:
  enabled: true
  replicas: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Service account
serviceAccount:
  create: true
  name: external-secrets-operator
  annotations: {}

# RBAC
rbac:
  create: true

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s

# Additional labels
labels: {}

# Additional annotations
annotations: {}

