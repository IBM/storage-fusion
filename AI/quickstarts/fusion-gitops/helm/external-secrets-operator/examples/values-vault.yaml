# Example values for External Secrets Operator with HashiCorp Vault
# Deploy with: helm install external-secrets-operator ./helm/external-secrets-operator -f examples/values-vault.yaml

global:
  openshift: true
  namespace: external-secrets-operator

operator:
  enabled: true
  namespace: external-secrets-operator

  # Create ExternalSecretsConfig resource
  # Set to false during initial deployment (Phase 1) to avoid CRD dependency issues
  # Set to true after operator is running and CRDs are established (Phase 2)
  # The deployment script handles this automatically in two phases
  createExternalSecretsConfig: false

  subscription:
    # Use Red Hat certified operator for OpenShift
    channel: stable-v1
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    name: openshift-external-secrets-operator
    installPlanApproval: Automatic

# Enable Vault secret store
secretStores:
  vault:
    enabled: true
    name: vault-backend
    server: "http://vault.vault.svc.cluster.local:8200"
    path: "secret"
    version: "v2"

    # Enable automatic Vault configuration
    autoInitialize: true

    # Vault seal type determines which secret contains the root token
    # Options: "shamir" or "awskms"
    # - "shamir": Uses Shamir's Secret Sharing (default) -> vault-unseal-keys
    # - "awskms": Uses AWS KMS auto-unseal -> vault-recovery-keys
    sealType: "shamir"

    # Secret containing Vault root token (optional - overrides sealType)
    # If not set, will be derived from sealType automatically
    # Leave empty to use automatic selection based on sealType
    tokenSecret: ""

    # Enable automatic RBAC creation
    rbac:
      # Set to true to allow Vault to perform TokenReview operations
      createTokenReviewBinding: true
      vaultServiceAccount: "vault"
      vaultNamespace: "vault"

    # Init job configuration
    initJob:
      image: "docker.io/hashicorp/vault:1.15.0"

    auth:
      method: kubernetes
      kubernetes:
        mountPath: "kubernetes"
        role: "external-secrets"
        ttl: "24h"
        serviceAccountRef:
          name: external-secrets
          namespace: external-secrets

    # NetworkPolicy configuration
    # Allows External Secrets pods to reach Vault on port 8200
    networkPolicy:
      enabled: true

# Enable example
examples:
  enabled: true
  vault:
    enabled: true
    name: example-vault-secret
    namespace: default
    refreshInterval: 1h
    targetSecretName: my-app-secrets
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    data:
      - secretKey: database-username
        remoteRef:
          key: myapp/database
          property: username
      - secretKey: database-password
        remoteRef:
          key: myapp/database
          property: password
      - secretKey: api-key
        remoteRef:
          key: myapp/api
          property: key

