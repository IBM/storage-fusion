# IBM Fusion Developer Hub - Operator-Based Production Configuration
# This example demonstrates a production-ready deployment with:
# - IBM Fusion AI components
# - High availability PostgreSQL
# - Enterprise security features
# - OIDC authentication
# - Automated backups

global:
  # Replace with your OpenShift cluster domain
  wildcardDomain: apps.your-cluster.example.com
  
  # Tools image for setup jobs (contains oc, kubectl, bash)
  toolsImage: quay.io/openshift/origin-cli:latest
  
  # Models namespace for AI deployments
  modelsNamespace: maas-models

# Operator Configuration
operators:
  enabled: true
  
  # Red Hat Developer Hub Operator
  developerHub:
    enabled: true
    # Use 'fast' channel for latest features, 'stable' for production stability
    channel: fast
    # Pin to specific version for production (optional but recommended)
    # Leave empty to use latest version in channel
    # To find available versions: oc get packagemanifest rhdh -n openshift-marketplace -o yaml
    startingCSV: ""  # Example: "rhdh-operator.v1.2.0"
    namespace: rhdh-operator
    # Automatic: Operator upgrades automatically
    # Manual: Requires manual approval for upgrades (recommended for production)
    installPlanApproval: Automatic
  
  # Crunchy PostgreSQL Operator
  postgres:
    enabled: true
    # Use 'v5' channel for Crunchy Postgres Operator
    channel: v5
    # Pin to specific version for production (optional but recommended)
    # Leave empty to use latest version in channel
    # To find available versions: oc get packagemanifest crunchy-postgres-operator -n openshift-marketplace -o yaml
    startingCSV: ""  # Example: "postgresoperator.v5.4.0"
    namespace: postgres-operator
    watchAllNamespaces: true
    # Automatic: Operator upgrades automatically
    # Manual: Requires manual approval for upgrades (recommended for production)
    installPlanApproval: Manual  # Manual approval recommended for production

# Developer Hub Instance Configuration
developerHub:
  enabled: true
  createInstance: true  # Create the Developer Hub instance
  instanceName: fusion-developer-hub
  # namespace: ""  # Uses .Release.Namespace by default
  
  # High availability - 3 replicas
  replicas: 3
  
  # Application Configuration
  config:
    title: "IBM Fusion Developer Hub"
    organizationName: "IBM Fusion"
    hostname: ""  # Auto-generated: fusion-developer-hub-fusion-developer-hub.apps.your-cluster.example.com
    
    # Homepage customization (disabled by default - uses standard RHDH homepage)
    # Set enabled: true to use Fusion custom homepage
