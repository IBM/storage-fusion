        - title: "🔄 Application Modernization"
          description: "Transform legacy applications to cloud-native with automated analysis and migration tools"
          links:
            - text: "Transformation Advisor"
              url: "/transformation-advisor"
            - text: "Mono2Micro Analysis"
              url: "/mono2micro"
