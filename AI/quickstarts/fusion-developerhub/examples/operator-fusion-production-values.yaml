  # IBM Fusion AI Configuration
  fusion:
    enabled: true
    
    # Fusion AI API
    api:
      baseUrl: "https://fusion-api.example.com"
      timeout: 30000
    
    # AI Models
    ai:
      enabled: true
      models:
        - name: watsonx
          type: llm
          endpoint: "https://watsonx-api.example.com/v1"
        - name: granite-code
          type: code-assistant
          endpoint: "https://granite-code-api.example.com/v1"
        - name: granite-chat
          type: conversational
          endpoint: "https://granite-chat-api.example.com/v1"
      rhoaiConnector:
        enabled: true
        tokenSecretName: "rhdh-rhoai-connector-token"
    
    # Modernization Tools
    modernization:
      enabled: true
      tools:
        - name: transformation-advisor
          enabled: true
        - name: mono2micro
          enabled: true
        - name: app-navigator
          enabled: true
  
  # PostgreSQL Database - High Availability
  database:
    useOperator: true
    clusterName: fusion-postgres
    
    # 3 instances for HA (1 primary + 2 replicas)
    instances: 3
    
    # PostgreSQL tuning for production
    maxConnections: "200"
    sharedBuffers: "512MB"
    effectiveCacheSize: "2GB"
    workMem: "32MB"
    
    # Storage
    storageSize: 100Gi
    storageClassName: ""  # Use default storage class
    
    # Resource limits
    resources:
      limits:
        cpu: "4"
        memory: 8Gi
      requests:
        cpu: "2"
        memory: 4Gi
    
    # Automated Backups to Object Storage
    backup:
      enabled: true
      useODF: true  # Use OpenShift Data Foundation
      odfStorageClass: openshift-storage.noobaa.io
      destinationPath: s3://fusion-postgres-backup
      retentionPolicy: "30d"  # Keep backups for 30 days
  
  # Catalog Configuration
  catalog:
    enabled: true
    
    # GitHub integration
    github:
      enabled: true
      target: https://github.com/your-org
    
    # GitLab integration (optional)
    gitlab:
      enabled: false
      target: https://gitlab.com/your-org
  
  # TechDocs Configuration
  techdocs:
    enabled: true
    s3Bucket: fusion-techdocs
    s3Region: us-south
    s3Endpoint: ""  # Auto-configured with ODF
  
  # Authentication - OIDC (Production)
  auth:
    enabled: true
    
    # GitHub OAuth (optional)
    github:
      enabled: false
      # Set via secrets: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
    
    # OIDC Provider (IBM ID, Okta, Auth0, etc.)
    oidc:
      enabled: true
      metadataUrl: "https://your-oidc-provider.com/.well-known/openid-configuration"
      signInResolver: "emailMatchingUserEntityProfileEmail"
      # Set via secrets: OIDC_CLIENT_ID, OIDC_CLIENT_SECRET
  
  # Environment variables from secrets
  extraEnvs:
    secrets:
      - name: fusion-developer-hub-secrets
  
  # Resource Limits for Developer Hub
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "2"
      memory: 4Gi
  
  # Security Configuration
  security:
    # Network Policies
    networkPolicy:
      enabled: true
    
    # Pod Security Standards
    podSecurityStandards:
      enabled: true
    
    # Resource Quotas
    resourceQuota:
      cpu: "32"
      memory: "64Gi"
      cpuLimit: "64"
      memoryLimit: "128Gi"
      pvc: "20"
    
    # Pod Security Context (OpenShift SCC compliant)
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: null  # Let OpenShift assign
      fsGroup: null    # Let OpenShift assign
      seccompProfile:
        type: RuntimeDefault
    
    # Container Security Context
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsUser: null
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
  
  # Route Configuration
  route:
    enabled: true
    tls:
      enabled: true
      secretName: ""  # Use auto-generated certificate

# Monitoring
monitoring:
  enabled: true

# OpenShift Console QuickStart
quickstart:
  enabled: true

# Common Labels
commonLabels:
  environment: production
  team: fusion-ai
  managed-by: helm

# Common Annotations
commonAnnotations:
  contact: fusion-team@example.com

