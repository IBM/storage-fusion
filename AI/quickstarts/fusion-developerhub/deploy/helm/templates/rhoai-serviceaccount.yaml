{{- if and .Values.developerHub.enabled .Values.developerHub.fusion.ai.rhoaiConnector.enabled .Values.developerHub.serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "fusion-developer-hub.serviceAccountName" . }}
  namespace: {{ include "fusion-developer-hub.namespace" . }}
  labels:
    {{- include "fusion-developer-hub.labels" . | nindent 4 }}
    component: rhoai-connector
  annotations:
    argocd.argoproj.io/sync-wave: "50"
  {{- with .Values.developerHub.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

