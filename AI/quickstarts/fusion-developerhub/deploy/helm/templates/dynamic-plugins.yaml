{{- if .Values.developerHub.enabled }}
{{- if .Values.developerHub.createInstance }}
---
# Dynamic Plugins ConfigMap for Red Hat Developer Hub
# This ConfigMap enables the DynamicHomePage plugin and configures
# the Fusion homepage layout with quick links, welcome message,
# featured content, and timezone clocks.
# Only created when homepage.enabled or RHOAI connector is true.
{{- $homepageEnabled := and .Values.developerHub.config.homepage .Values.developerHub.config.homepage.enabled }}
{{- $rhoaiEnabled := and .Values.developerHub.fusion .Values.developerHub.fusion.ai .Values.developerHub.fusion.ai.rhoaiConnector .Values.developerHub.fusion.ai.rhoaiConnector.enabled }}
{{- if or $homepageEnabled $rhoaiEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: fusion-dynamic-plugins
  namespace: {{ .Values.developerHub.namespace }}
  labels:
    {{- include "fusion-developer-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: developerhub-plugins
  annotations:
    argocd.argoproj.io/sync-wave: "50"
data:
  dynamic-plugins.yaml: |
    includes:
      - dynamic-plugins.default.yaml
    plugins:
      {{- if $homepageEnabled }}
      # Enable the Dynamic Home Page plugin — required for custom homepage rendering
      - package: './dynamic-plugins/dist/red-hat-developer-hub-backstage-plugin-dynamic-home-page'
        disabled: false
      {{- end }}
      {{- if $rhoaiEnabled }}
      # RHOAI Model Catalog Plugin - Enables model discovery from OpenShift AI Model Registry
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-catalog-backend-module-model-catalog:bs_1.42.5__0.7.0!red-hat-developer-hub-backstage-plugin-catalog-backend-module-model-catalog'
        disabled: false
      # TechDoc URL Reader Backend Plugin - Required for RHOAI connector
      - package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/red-hat-developer-hub-backstage-plugin-catalog-techdoc-url-reader-backend:bs_1.42.5__0.3.0!red-hat-developer-hub-backstage-plugin-catalog-techdoc-url-reader-backend'
        disabled: false
      {{- end }}
---
# QuickAccess ConfigMap for the homepage QuickAccessCard
# This ConfigMap provides the data for the Quick Access card on the homepage.
# The ConfigMap name follows the RHDH convention: <backstage-instance-name>-home-quick-access
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.developerHub.instanceName }}-home-quick-access
  namespace: {{ .Values.developerHub.namespace }}
  labels:
    {{- include "fusion-developer-hub.labels" . | nindent 4 }}
    app.kubernetes.io/component: developerhub-homepage
  annotations:
    argocd.argoproj.io/sync-wave: "50"
data:
  data.json: |
    [
      {{- if .Values.developerHub.config.homepage.quickLinks }}
      {{- range $index, $link := .Values.developerHub.config.homepage.quickLinks }}
      {{- if $index }},{{- end }}
      {
        "title": {{ $link.title | quote }},
        "isExpanded": true,
        "links": [
          {
            "label": {{ $link.title | quote }},
            "url": {{ $link.url | quote }},
            "iconUrl": "/homepage/icons/icons8/system-task.png"
          }
        ]
      }
      {{- end }}
      {{- else }}
      {
        "title": "Blueprints & Quickstarts",
        "isExpanded": true,
        "links": [
          {
            "label": "Browse NVIDIA Blueprints",
            "url": "/catalog?filters%5Bkind%5D=component&filters%5Btype%5D=blueprint&limit=20",
            "iconUrl": "/homepage/icons/community-icon.png"
          },
          {
            "label": "Browse Fusion Quickstarts",
            "url": "/catalog?filters%5Bkind%5D=component&filters%5Btype%5D=quickstart&limit=20",
            "iconUrl": "/homepage/icons/community-icon.png"
          },
          {
            "label": "Browse Redhat Quickstarts",
            "url": "https://docs.redhat.com/en/learn/ai-quickstarts",
            "iconUrl": "/homepage/icons/community-icon.png"
          }
        ]
      },
      {
        "title": "Documentation",
        "isExpanded": true,
        "links": [
          {
            "label": "Fusion HCI Knowledge Center",
            "url": "https://www.ibm.com/docs/en/fusion-hci-systems/2.13.0",
            "iconUrl": "/homepage/icons/doc-icon.png"
          },
          {
            "label": "Fusion SDS Knowledge Center",
            "url": "https://www.ibm.com/docs/en/fusion-software/2.13.0",
            "iconUrl": "/homepage/icons/doc-icon.png"
          }
        ]
      },
      {
        "title": "Deployed AI Models",
        "isExpanded": false,
        "links": [
          {
            "label": "View Deployed Models",
            "url": "/catalog?filters%5Bkind%5D=component&filters%5Btype%5D=model-server&limit=20",
            "iconUrl": "/homepage/icons/ai-models-icon.png"
          }
        ]
      },
      {
        "title": "Resources & Community",
        "isExpanded": false,
        "links": [
          {
            "label": "Fusion Tech Community",
            "url": "https://ibm.github.io/storage-fusion/fusion-ai/overview/",
            "iconUrl": "/homepage/icons/quickstart-icon.png"
          },
          {
            "label": "IBM Tech Exchange",
            "url": "https://community.ibm.com/community/user/groups/community-home/recent-community-blogs?communitykey=e596ba82-cd57-4fae-8042-163e59279ff3",
            "iconUrl": "/homepage/icons/quickstart-icon.png"
          }
        ]
      }
      {{- end }}
    ]
binaryData:
  quickstart-icon.png: 
  doc-icon.png: 
  ai-models-icon.png: 
  community-icon.png: 
  tech-exchange.png: 
{{- end }}
{{- end }}
{{- end }}
