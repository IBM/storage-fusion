{{- if and .Values.developerHub.enabled .Values.developerHub.fusion.ai.rhoaiConnector.enabled .Values.developerHub.fusion.ai.rhoaiConnector.rbac.create }}
---
# Secret for ServiceAccount token (kubernetes.io/service-account-token type)
# This secret is automatically populated by Kubernetes with a token for the ServiceAccount
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.developerHub.fusion.ai.rhoaiConnector.tokenSecretName }}
  namespace: {{ include "fusion-developer-hub.namespace" . }}
  labels:
    {{- include "fusion-developer-hub.labels" . | nindent 4 }}
    component: rhoai-connector
  annotations:
    kubernetes.io/service-account.name: {{ include "fusion-developer-hub.serviceAccountName" . }}
    argocd.argoproj.io/sync-wave: "50"
type: kubernetes.io/service-account-token
{{- end }}

