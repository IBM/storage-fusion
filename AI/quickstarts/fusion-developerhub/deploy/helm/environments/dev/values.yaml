# Development configuration for IBM Fusion Developer Hub
global:
  # IMPORTANT: Change this to match your OpenShift cluster domain
  wildcardDomain: apps.<cluster-domain>.com
  # Name of the certificate secret for ingress (leave empty for self-signed)
  wildcardCertName: ""
  # Default namespace for model deployments
  modelsNamespace: maas-models
  # Tools image for jobs (should contain oc, kubectl, bash)
  toolsImage: quay.io/openshift/origin-cli:latest

# Operators Configuration
operators:
  # Enable operator installation (disable if operators already exist)
  enabled: true
  # Skip operator installation if they already exist in the cluster
  # Set to true to use existing operators instead of installing new ones
  skipIfExists: true
  # Red Hat Developer Hub Operator
  developerHub:
    enabled: true
    # Operator channel (fast, stable)
    channel: fast
    # Specific operator version (CSV name)
    # Leave empty for latest version in channel
    # Example: "rhdh-operator.v1.2.0"
    startingCSV: ""
    # Operator namespace
    namespace: rhdh-operator
    # Note: RHDH operator requires AllNamespaces install mode
    # It will automatically watch all namespaces
    # Install plan approval (Automatic or Manual)
    installPlanApproval: Automatic
  # PostgreSQL Operator (Crunchy Postgres for Kubernetes)
  postgres:
    enabled: true
    # Operator channel (v5, stable)
    channel: v5
    # Specific operator version (CSV name)
    # Leave empty for latest version in channel
    # Example: "postgresoperator.v5.4.0"
    startingCSV: ""
    # Operator namespace
    namespace: postgres-operator
    # Operator catalog source
    source: certified-operators
    # Watch all namespaces
    watchAllNamespaces: true
    # Install plan approval (Automatic or Manual)
    installPlanApproval: Automatic

  # Red Hat Developer Hub Operator # Production-additional
  # rhdh:
  #   namespace: rhdh-operator
  #   channel: fast
  #   installPlanApproval: Automatic
  # # Crunchy PostgreSQL Operator
  # postgresql:
  #   namespace: postgres-operator
  #   channel: v5
  #   installPlanApproval: Automatic

# ArgoCD RBAC Configuration
# Grants ArgoCD permissions to manage resources like NetworkPolicy, ResourceQuota, LimitRange
argocd:
  enabled: false
  rbac:
    # Enable ArgoCD RBAC (set to true when deploying via ArgoCD)
    enabled: false
    # ArgoCD service account name
    serviceAccountName: openshift-gitops-argocd-application-controller
    # ArgoCD namespace
    namespace: openshift-gitops

# Monitoring Configuration
monitoring:
  # Enable monitoring stack
  enabled: false
  # Prometheus integration
  prometheus:
    enabled: false
    serviceMonitor:
      enabled: false
      interval: 30s
  # Grafana dashboards
  grafana:
    enabled: false

# Additional labels to apply to all resources
commonLabels:
  environment: development
  team: fusion-ai

# Additional annotations to apply to all resources
commonAnnotations: {}
# managed-by: helm

# Developer Hub Configuration
developerHub:
  # Enable Developer Hub deployment
  enabled: true
  # Create Backstage instance (requires operator CRDs to exist)
  # Set to true to create the instance immediately
  # Default is true for easier initial setup
  createInstance: true
  # Developer Hub instance name
  instanceName: fusion-dev-hub
  # Namespace for Developer Hub instance
  # IMPORTANT: This should match the --namespace flag used with helm install/upgrade
  # Leave empty to use .Release.Namespace automatically
  # namespace: ""  # Uses .Release.Namespace by default
  # Service Account configuration
  # Used for RBAC permissions, especially for RHOAI connector
  serviceAccount:
    # Create a dedicated service account (default: false, uses "default" SA)
    # Set to true if you need custom RBAC permissions
    create: false
    # Name of the service account to use
    # If not set and create is true, a name is generated using the fullname template
    # If not set and create is false, uses "default" service account
    name: ""
    # Annotations to add to the service account
    annotations: {}
  # Storage configuration for dynamic plugins
  storage:
    # Storage class for dynamic plugins PVC (ReadWriteMany access mode required)
    # Leave empty to use cluster default storage class
    #
    # IMPORTANT: Must support ReadWriteMany (RWX) access mode
    # - If using OpenShift Data Foundation (ODF): use "ocs-storagecluster-cephfs"
    # - If using NFS: use "nfs-client" or your NFS storage class
    # - Other filesystem storage classes that support RWX
    storageClassName: "" # Uses cluster default
    # Storage size for dynamic plugins
    size: 5Gi
  # High Availability - 3 replicas
  replicas: 1
  # Application configuration
  config:
    # Application title
    title: "IBM Fusion Developer Hub"
    # Organization name
    organizationName: "IBM Fusion"
    # Hostname for the Developer Hub (leave empty for auto-generation)
    hostname: ""
    # IBM Fusion AI Homepage (enabled by default)
    homepage:
      # Enable Fusion custom homepage (default: true - uses Fusion custom homepage)
      enabled: true
      # Welcome message on homepage (optional - defaults to Fusion welcome message)
      # Uncomment to customize:
      # welcomeTitle: "Welcome to Your Company Developer Hub"
      # welcomeMessage: |
      #   Your custom welcome message here

      # Company logo URL (displayed in top-left corner)
      # Recommended size: 200x50px or similar aspect ratio
      # Leave empty to use default IBM Fusion branding
      # Example: "https://your-cdn.com/logo.png" or "data:image/svg+xml;base64,..."
      companyLogo: "data:image/svg+xml;base64,"
      # Company logo icon (small icon for mobile/compact view)
      # Recommended size: 32x32px
      companyLogoIcon: ""
      quickAccessDataUrl: "https://raw.githubusercontent.com/IBM/storage-fusion/dynamic-plugins/AI/quickstarts/fusion-developerhub/assets/homepage"
      
      welcomeTitle: "Streamline Development with Fusion Developer Hub"
      welcomeMessage: |
        IBM Fusion Developer Hub is an enterprise-grade developer portal that centralizes tools, documentation, and platform services into a single, unified self-service experience. It eliminates the friction of navigating disparate systems by bringing blueprints, model catalogs, guided quickstarts, and operational resources together in one place. Built to grow with your organization, IBM Fusion Developer Hub standardizes how teams discover, access, and operate. It enables teams to onboard faster, collaborate more effectively, and deliver value at scale.

        • Standardizes development workflows across teams

        • Improves developer and application onboarding

        • Drives innovation at scale
        
        🚀 **Getting Started**

        Follow the [Quickstart Guide](https://community.ibm.com/community/user/blogs/anushka-jaiswal/2026/05/29/quickstart-developer-hub-on-ibm-fusion-with-redhat) to begin navigating your portal — explore the software catalog, view available blueprints, and access unified documentation.
      
      # Quick access links (optional - defaults to Fusion quick links). Add quicklinks here if you want to override the default quicklinks. Defaults are present in dynamic-plugins.yaml file
      # Uncomment to customize:
      # quickLinks:
      #   - title: "Create Application"
      #     description: "Start with templates"
      #     url: "/create"
      #     icon: "add"

      # Featured content sections (optional - defaults to Fusion featured content)
      # Uncomment to customize:
      # featuredContent:
      #   - title: "🚀 Your Initiative"
      #     description: "Description here"
      #     links:
      #       - text: "Link 1"
      #         url: "/path1"

      # OpenShift AI Model Connector (KEY FEATURE)
      plugins:
        - name: openshift-ai-connector
          enabled: false
          config:
            # Discover models every 30 seconds
            discoveryInterval: 30s
            # Namespaces to scan for models
            namespaces:
              - model-serving
              - maas-runtime
              - redhat-ods-applications
            # Display options
            displayOptions:
              showMetrics: true
              showEndpoints: true
              showStatus: true
              refreshInterval: 30s
    # Catalog configuration
    catalog:
      enabled: true
      # GitHub integration for catalog imports
      github:
        enabled: false
        # target: https://github.com/your-org
        # enterpriseHost: "github.ibm.com"
        # enableToken: true
      # Catalog providers for automatic discovery
      providers:
        # OpenShift AI provider
        openshiftAI:
          enabled: false
          schedule:
            frequency:
              minutes: 1
            timeout:
              minutes: 3
    # TechDocs configuration
    techdocs:
      enabled: true
      # builder: local # Production-additional
      # generator:
      #   runIn: local
      # publisher:
      #   type: local
    # Authentication (configure for production)
    auth:
      # environment: production
      guest:
        enabled: true
      github:
        enabled: false
        # Uncomment to add your org url
        # enterpriseInstanceUrl: ""
        # allowSignInWithoutCatalog: true
      # Add your OIDC provider here
      # oidc:
      #   enabled: true
      #   metadataUrl: "https://your-sso.com/.well-known/openid-configuration"
      #   clientId: "your-client-id"
      #   clientSecret: "your-client-secret"
  # PostgreSQL Database configuration
  database:
    # Use PostgreSQL operator for database
    useOperator: true
    # PostgreSQL cluster name
    clusterName: fusion-dev-postgres
    # Note: The database configuration automatically includes pluginDivisionMode: 'database'
    # This setting tells Backstage to create separate databases for each plugin,
    # which requires the PostgreSQL user to have CREATEDB privilege.
    # The CREATEDB privilege is automatically granted during deployment.

    # Number of PostgreSQL instances (for HA)
    instances: 1
    # PostgreSQL configuration
    maxConnections: "100"
    sharedBuffers: "256MB"
    effectiveCacheSize: "1GB"
    workMem: "16MB"
    # Storage configuration
    storageSize: 20Gi
    storageClassName: "" # Use default
    # Resource limits
    resources:
      limits:
        cpu: "2"
        memory: 4Gi
      requests:
        cpu: "1"
        memory: 2Gi
    # Backup configuration
    backup:
      enabled: false
      useODF: true # Use IBM Fusion / OpenShift Data Foundation
      odfStorageClass: openshift-storage.noobaa.io
      destinationPath: s3://developerhub-postgres-backup
      s3Endpoint: "" # Auto-populated from OBC
      retentionPolicy: "30d"
  # GitHub Enterprise configuration (outside config block to match base values.yaml)
  catalog:
    enabled: true
    # Fusion Blueprints Configuration
    # Define catalog locations for IBM Fusion AI blueprints and components
    # Each blueprint can have its own catalog-info.yaml with TechDocs support

    blueprints:
      enabled: true
      locations:
        # NVIDIA RAG Blueprint
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/NVIDIA%20Blueprints/NVIDIA%20RAG/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        # NVIDIA AIQ Blueprint
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/NVIDIA%20Blueprints/NVIDIA%20AIQ/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        # NVIDIA VSS Blueprint
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/NVIDIA%20Blueprints/NVIDIA%20VSS/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        # Fusion Developer Hub Quickstart
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/quickstarts/fusion-developerhub/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        # Fusion GitOps Quickstart
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/quickstarts/fusion-gitops/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        # Model-as-a-Service Quickstart
        - type: url
          target: https://github.com/IBM/storage-fusion/blob/dynamic-plugins/AI/quickstarts/model-as-a-service/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
    # GitHub integration for catalog imports
    github:
      enabled: false
      target: https://github.com/your-org
      # GitHub Enterprise Configuration (Optional)
      # Uncomment to enable GitHub Enterprise
      # enterpriseHost: "github.company.com"  # e.g., github.company.com (hostname only, no https://)

      # Enable GitHub PAT token for repository access
      # Requires GITHUB_TOKEN in github-auth-secret
      enableToken: false
    # GitLab integration
    gitlab:
      enabled: false
      target: https://gitlab.com/your-org
  # TechDocs configuration
  techdocs:
    enabled: true
    s3Bucket: developerhub-techdocs
    s3Region: us-south
    s3Endpoint: "" # Set to IBM Fusion endpoint (leave empty to use local storage)
  # Authentication configuration
  auth:
    enabled: true
    # Authentication environment defaults to "development" (from base values.yaml)
    # This allows both guest access AND GitHub OAuth to work together
    #
    # To disable guest access and use GitHub OAuth only:
    # Set environment to "production"
    # Note: With environment: "production", guest access will be automatically disabled
    # environment: "production"
    guest:
      enabled: true
    # GitHub OAuth Authentication
    # Enables "Sign in with GitHub" button
    # Requires github-auth-secret with GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET
    github:
      enabled: false
      # GitHub Enterprise Configuration (Optional)
      # Uncomment to enable GitHub Enterprise OAuth
      # enterpriseInstanceUrl: "https://github.company.com"  # e.g., https://github.company.com (full URL with https://)

      # Set to true if want to Allow any GitHub user to sign in (not just catalog users)
      allowSignInWithoutCatalog: false
    # OIDC (OpenShift, Keycloak, etc.)
    # Set metadataUrl to enable OIDC authentication
    # Default: disabled to allow guest access
    oidc:
      enabled: false
      metadataUrl: "" # Set to your OIDC provider (e.g., https://keycloak.example.com/auth/realms/master/.well-known/openid-configuration)
      clientId: "" # OIDC Client ID 
      clientSecret: "" # OIDC Client Secret
      signInResolver: "emailMatchingUserEntityProfileEmail"
  # Extra environment variables from secrets
  # The developerhub-secrets is automatically added when auth providers are enabled
  # Add additional secrets here if needed
  # Example:
  # extraEnvs:
  #   secrets:
  #     - name: custom-secrets
  extraEnvs:
    secrets: []
    # - name: github-auth-secret
  # Production resources
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: "500m"
      memory: 1Gi
  # Route configuration
  route:
    enabled: true
    tls:
      enabled: true
      secretName: "" # Leave empty for auto-generated cert
  # IBM Fusion AI Configuration
  fusion:
    enabled: true # Enable IBM Fusion features including templates
    # Fusion AI API endpoints
    api:
      baseUrl: "https://fusion-api.example.com"
      timeout: 30000
    # AI/ML capabilities
    ai:
      enabled: true
      models:
        - name: watsonx
          type: llm
          endpoint: ""
        - name: granite-code
          type: code-assistant
          endpoint: ""
        - name: granite-chat
          type: conversational
          endpoint: ""
      # Integration with Red Hat OpenShift AI (RHOAI)
      # Enables automatic discovery of deployed AI models
      # Requires creating the rhdh-rhoai-connector-token secret
      # Default: false (requires additional setup)
      rhoaiConnector:
        enabled: true
        # Name of the secret containing the access token for RHOAI
        tokenSecretName: "rhdh-rhoai-connector-token"
        # RBAC configuration for RHOAI connector
        # The connector needs cluster-level permissions to read CRDs and InferenceServices
        rbac:
          # Automatically create ClusterRole and ClusterRoleBinding when connector is enabled
          # Set to false if you want to manage RBAC manually
          create: true # Automatically creates required RBAC
          # Namespaces to watch for InferenceServices (empty = all namespaces)
          # Example: ["rhoai-models", "ai-workloads"]
          watchNamespaces: [] # Watch all namespaces
          # Model Registry namespace configuration
          # Set this to grant access to RHOAI model registry
          # Leave empty to skip model registry RoleBinding creation
          # Uncomment and set to grant access to RHOAI model registry
          modelRegistryNamespace: ""  # Example: "rhoai-model-registries" or "odh-model-registries"
          modelRegistryRoleName: "registry-user-modelregistry-public"
    # Application modernization tools
    modernization:
      enabled: true
      tools:
        - name: transformation-advisor
          enabled: true
        - name: mono2micro
          enabled: true
        - name: app-navigator
          enabled: true
  # Security configuration
  security:
    # Network policies
    networkPolicy:
      enabled: false
    # Pod Security Standards
    podSecurityStandards:
      enabled: true
    # Resource quotas for the namespace
    resourceQuota:
      cpu: "8"
      memory: "16Gi"
      cpuLimit: "16"
      memoryLimit: "32Gi"
      pvc: "10"
    # Pod security context (OpenShift SCC compliant)
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: null # Let OpenShift assign from namespace range
      fsGroup: null # Let OpenShift assign from namespace range
      seccompProfile:
        type: RuntimeDefault
    # Container security context
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsUser: null # Let OpenShift assign from namespace range
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false # Developer Hub needs to write temp files

# OpenShift Console QuickStart Configuration
quickstart:
  # Enable deployment of the Getting Started QuickStart
  enabled: true

# PostgreSQL HA Configuration
postgresql:
  enabled: false
  # High Availability - 3 instances
  instances: 3
  # Database configuration
  database:
    # CRITICAL: Use schema-based plugin isolation instead of separate databases
    # This prevents "permission denied to create database" errors
    pluginDivisionMode: schema
  # Production resources
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  # Storage configuration
  storage:
    size: 20Gi
    # Storage class for PostgreSQL (ReadWriteOnce access mode is sufficient)
    # Leave empty to use cluster default storage class
    #
    # - If using OpenShift Data Foundation (ODF): use "ocs-storagecluster-ceph-rbd"
    # - Other block storage classes that support RWO
    storageClassName: "" # Uses cluster default
  # Automated backups
  backup:
    enabled: false
    schedule: "0 2 * * *" # Daily at 2 AM
    retention: "30d"
    # Backup to ODF
    repos:
      - name: repo1
        schedules:
          full: "0 2 * * 0" # Weekly full backup on Sunday
          differential: "0 2 * * 1-6" # Daily differential
        volume:
          volumeClaimSpec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 50Gi
            # Storage class for backup volumes (ReadWriteOnce is sufficient)
            # Leave empty to use cluster default
            #
            # - If using OpenShift Data Foundation (ODF): use "ocs-storagecluster-ceph-rbd"
            # - Other block storage classes that support RWO
            storageClassName: "" # Uses cluster default

# Security Configuration
security:
  # Network policies
  networkPolicy:
    enabled: false
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                network.openshift.io/policy-group: ingress
    egress:
      - to:
          - namespaceSelector: {}
        ports:
          - protocol: TCP
            port: 443
          - protocol: TCP
            port: 5432
  # Pod security standards
  podSecurity:
    enabled: u2xMAAAdWSURBVGgF7VlpbFRVFP7uzHQ6LbRTCrRVBAltBSStS0FWQUNcQRQDoSoSY6L8MJqYmCCJBk00MUqMW0TUP6gkCnEjilpAZakoiqhgpSBO1dLGAgXa0nbamTl
    enforce: restricted
  # Security context
  podSecurityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: false

# RBAC Configuration
rbac:
  enabled: false
  # Create service account
  create: false

# IBM Fusion AI Features
fusion:
  enabled: false
  # AI capabilities
  ai:
    enabled: false
    models:
      # Models will be discovered automatically from OpenShift AI
      autoDiscovery: false
    # RHOAI Connector - enables model discovery from OpenShift AI
    rhoaiConnector:
      enabled: false
      tokenSecretName: "rhdh-rhoai-connector-token"
      rbac:
        create: false
        watchNamespaces: [] # Empty = watch all namespaces
  # Modernization tools
  modernization:
    enabled: false
    tools:
      - transformation-advisor
      - mono2micro
      - app-navigator

# Templates Configuration
templates:
  enabled: false
  # IBM Fusion AI templates
  locations:
    - type: url
      target: https://github.com/IBM/storage-fusion/blob/main/AI/quickstarts/fusion-developerhub/templates/fusion-ai-template.yaml

# Ingress/Route Configuration
route:
  enabled: false
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Resource Quotas (optional)
resourceQuota:
  enabled: false
  # Uncomment to enable
  # hard:
  #   requests.cpu: "10"
  #   requests.memory: "20Gi"
  #   limits.cpu: "20"
  #   limits.memory: "40Gi"

# Horizontal Pod Autoscaling (optional)
autoscaling:
  enabled: false
  # Uncomment to enable
  # minReplicas: 3
  # maxReplicas: 10
  # targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
