site_name: Quickstart: Fusion Developer Hub
site_description: Deploy Fusion Developer Hub

# Point to the IBM storage-fusion repo for documentation
repo_url: https://github.com/IBM/storage-fusion
repo_name: IBM/storage-fusion

# Use current directory (where mkdocs.yml is located)
docs_dir: .

# Point to your actual markdown file
nav:
  - Home: QUICKSTART.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - techdocs-core


# Safe markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
