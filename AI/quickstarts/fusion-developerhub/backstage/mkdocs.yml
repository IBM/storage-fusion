site_name: Quickstart - Fusion Developer Hub
site_description: Deploy Red Hat Developer Hub on IBM Fusion with AI integration

# Point to the IBM storage-fusion repo for documentation
repo_url: https://github.com/IBM/storage-fusion
repo_name: IBM/storage-fusion

# Point to parent directory for docs
docs_dir: ..

# Point to your actual markdown file in parent directory
nav:
  - Home: QUICKSTART.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - techdocs-core


# Safe markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# Made with Bob
