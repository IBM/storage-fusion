site_name: IBM Fusion Developer Hub
site_description: Enterprise developer portal for IBM Fusion HCI - built on Red Hat Developer Hub (Backstage)

# Point to the IBM storage-fusion repo for documentation
repo_url: https://github.com/IBM/storage-fusion
repo_name: IBM/storage-fusion

# Point to docs directory
docs_dir: docs

# Navigation - single quickstart file
nav:
  - Home: index.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - techdocs-core

# Safe markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# Made with Bob
