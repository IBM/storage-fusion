apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: nvidia-aiq-blueprint
  title: How to deploy NVIDIA AIQ on IBM Fusion HCI
  description: |
    Deploy NVIDIA AI-Q, a research assistant blueprint that helps users extract insights from documents using generative AI. 
    AI-Q combines RAG pipelines for document-based Q&A, GPU-accelerated LLM inference, multi-stage reasoning and validation, and a simple UI for running research workflows.
    
    Unlike a simple chatbot, AI-Q represents a full AI workflow, making it ideal for validating enterprise AI platforms like IBM Fusion HCI. The platform provides predictable GPU scheduling and utilization using Red Hat OpenShift with the NVIDIA GPU Operator, secure controlled deployment within enterprise infrastructure, and a unified platform for multiple AI blueprints on the same Red Hat OpenShift-based environment.
  tags:
    - nvidia
    - aiq
    - ai
    - blueprint
    - fusion
    - gpu
    - llm
    - rag
    - research-assistant
