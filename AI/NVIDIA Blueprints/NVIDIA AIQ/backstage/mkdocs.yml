site_name: NVIDIA AI-Q Blueprint on IBM Fusion
site_description: Deploy NVIDIA AI-Q research assistant on IBM Fusion HCI for document-driven AI workflows

# Point to the IBM storage-fusion repo for documentation
repo_url: https://github.com/IBM/storage-fusion
repo_name: IBM/storage-fusion

# Point to parent directory for docs
docs_dir: ..

# Point to your actual markdown file in parent directory
nav:
  - Home: Fusion_NVIDIA_AIQ_Guide.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - techdocs-core


# Safe markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# Made with Bob
