metadata:
  name: nvidia-vss-blueprint
  title: Guide to deploy NVIDIA VSS Blueprint on IBM Fusion HCI
  description: |
    Deploy NVIDIA Video Search and Summarization (VSS), an AI-powered visual intelligence blueprint that transforms video from passive recordings into intelligent, queryable knowledge bases.
    
    VSS delivers automated video summarization with timestamped key events, natural language Q&A over video content, semantic search that understands meaning and context, and flexible processing for both live streams and archived footage. The architecture combines Cosmos-Reason2 8B VLM for visual understanding, Llama 3.1 70B LLM for natural language reasoning, and NeMo embedding and reranking models for intelligent retrieval. Together, these components convert raw video into structured, searchable intelligence, making video data searchable, understandable, and actionable for enterprise use cases.
