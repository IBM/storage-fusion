site_name: NVIDIA VSS Blueprint on IBM Fusion
site_description: Deploy NVIDIA Video Search and Summarization on IBM Fusion HCI for AI-powered video analytics

# Point to the IBM storage-fusion repo for documentation
repo_url: https://github.com/IBM/storage-fusion
repo_name: IBM/storage-fusion

# Point to docs directory
docs_dir: docs

# Point to your actual markdown file
nav:
  - Home: index.md

theme:
  name: material
  palette:
    primary: indigo
    accent: indigo

plugins:
  - techdocs-core


# Safe markdown extensions
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

# Made with Bob
