[pytest]
# Pytest configuration for CAS Chatbot

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Python path configuration
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    # Coverage disabled by default for faster test runs
    # Enable with: pytest --cov=chatbot --cov-report=html --cov-report=term-missing --cov-report=xml --cov-branch

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication related tests
    query: Query service tests
    llm: LLM service tests
    vector_store: Vector store service tests
    health: Health check tests
    cli: CLI interface tests
    requires_oc: Tests that require oc CLI
    requires_network: Tests that require network access
    cache: Cache service tests
    user: User service tests
    metrics: Metrics service tests
    validators: Validator tests
    formatter: Response formatter tests
    middleware: Middleware tests
    config: Configuration loader tests

# Coverage options
[coverage:run]
source = chatbot
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

; Made with Bob
